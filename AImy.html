<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>김건아 홈페이지</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      background: linear-gradient(180deg, #fff8fb 0%, #fffdf7 100%);
      color: #2b1f24;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .page {
      width: 100%;
      max-width: 860px;
      padding: 56px 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 44px;
    }

    .title {
      margin: 0;
      font-size: clamp(1.8rem, 3.4vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #333;
      white-space: nowrap;
    }

    .subtitle {
      margin: 28px 0 0;
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      color: #333;
      font-weight: 700;
      text-align: center;
    }

    .poem {
      display: flex;
      flex-direction: column;
      gap: 28px;
      text-align: center;
    }

    .verse {
      padding: 0;
      min-height: auto;
      display: block;
      text-align: center;
    }

    .verse p {
      margin: 0;
      font-size: 1.35rem;
      line-height: 2;
      white-space: pre-line;
    }

    @media (max-width: 700px) {
      .page {
        padding: 40px 22px;
      }

      .verse p {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <h1 class="title">김건아 홈페이지에 오신 것을 환영합니다.</h1>
      
    </header>

    <section class="poem">
      <article class="verse">
        <p>멋진 홈페이지가 되도록 노력
부디 저의 홈페이지에서 좋은 시간 가지시기 바라며
가실 때에 따뜻한 글을 남겨주시면 감사하겠습니다</p>
      </article>

      <article class="verse">
        <p>그리고 제 홈페이지에 궁금한 점이 있으시면
kka041206@naver.com으로
메일 보내주시기 바랍니다</p>
      </article>

      <article class="verse">
        <p>2026년 03월 19일</p>
      </article>

      <p class="subtitle">KD아카데미 강의실에서</p>
    </section>
  </main>
</body>
</html>
