<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>한국의 사계 - 가을</title>
    <style>
      /* 기본 여백 및 폰트 설정 */
      body {
        background-color: #fdb486; /* 살구색 배경 */
        margin: 0;
        padding: 80px 20px;
        font-family: "Malgun Gothic", "맑은 고딕", sans-serif;
        display: flex;
        justify-content: center; /* 전체 콘텐츠 중앙 정렬 */
        text-align: center;
      }

      /* 콘텐츠를 담는 중앙 컨테이너 */
      .container {
        width: 100%;
        max-width: 700px; /* 이미지 너비에 맞춘 최대 너비 설정 */
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* 제목 스타일 (h1 태그) */
      h1 {
        color: #b54517; /* 짙은 주황/갈색 텍스트 */
        font-size: 32px;
        font-weight: 900;
        margin-top: 0;
        margin-bottom: 25px;
        letter-spacing: 2px;
      }

      /* 이미지와 선을 감싸는 영역 */
      .image-section {
        width: 100%;
      }

      /* 위/아래 구분선 스타일 */
      .divider {
        width: 100%;
        height: 4px;
        background-color: #333333; /* 짙은 회색/검정 선 */
        border: none;
        margin: 0;
      }

      /* 메인 이미지 스타일 */
      .image-section img {
        width: 100%;
        display: block;
        margin: 10px 0; /* 선과 이미지 사이의 간격 */
        background-color: #ddd; /* 이미지가 없을 때를 대비한 임시 배경색 */
        min-height: 400px; /* 이미지가 없을 때 영역 유지를 위한 최소 높이 */
        object-fit: cover;
        border: none; /* 하이퍼링크가 걸렸을 때 파란 테두리 방지 */
      }

      /* 하단 링크 텍스트 스타일 (p 태그) */
      p {
        margin-top: 30px;
        font-size: 16px;
      }

      /* 하단 링크 (a 태그) 스타일 */
      p a {
        color: #222;
        text-decoration: none;
        font-weight: 600;
      }

      /* 링크 호버 시 밑줄 효과 */
      p a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- 제목 -->
      <h1>가을의 계절</h1>

      <!-- 이미지 및 상하단 구분선 영역 -->
      <div class="image-section">
        <hr class="divider" />
        <!-- 이미지 클릭 시 메인화면으로 이동하도록 a 태그 추가 -->
        <a href="index.html">
          <img src="./images/fall.jpg" alt="가을 단풍 풍경" />
        </a>
        <hr class="divider" />
      </div>

      <!-- 하단 메인화면 이동 링크 -->
      <p>
        <!-- 요청하신 메인화면 임의의 경로 -->
        <a href="index.html">[메인화면으로 이동]</a>
      </p>
    </div>
  </body>
</html>
