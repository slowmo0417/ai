<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>한국의 사계 - 메인</title>
    <style>
      /* 기본 배경 및 폰트 설정 */
      body {
        background-color: #d1f071; /* 연두색 배경 */
        margin: 0;
        padding: 100px 20px;
        font-family: "Malgun Gothic", "맑은 고딕", sans-serif;
        display: flex;
        justify-content: center;
        text-align: center;
        color: #222; /* 기본 텍스트 색상 */
      }

      /* 콘텐츠 중앙 컨테이너 */
      .container {
        width: 100%;
        max-width: 600px; /* 선의 길이를 결정하는 최대 너비 */
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* 메인 제목 스타일 */
      h1 {
        color: #2b3b18; /* 짙은 녹색/검정 계열 */
        font-size: 36px;
        font-weight: 900;
        margin-top: 0;
        margin-bottom: 30px;
        letter-spacing: 2px;
      }

      /* 링크와 선을 감싸는 영역 */
      .link-section {
        width: 100%;
      }

      /* 위/아래 굵은 구분선 */
      .divider {
        width: 100%;
        height: 4px;
        background-color: #333333;
        border: none;
        margin: 0;
      }

      /* 계절 링크 리스트 스타일 */
      ul.season-list {
        list-style: none;
        padding: 30px 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 20px; /* 링크 사이의 세로 간격 */
      }

      ul.season-list li {
        font-size: 18px;
      }

      /* 링크 기본 스타일 */
      ul.season-list a {
        color: #222;
        text-decoration: none;
        font-weight: 600;
      }

      /* 호버 기능: 마우스를 올렸을 때 파란색 텍스트와 밑줄 */
      ul.season-list a:hover {
        color: blue;
        text-decoration: underline;
      }

      /* 하단 카피라이트 텍스트 */
      .footer-text {
        margin-top: 20px;
        font-size: 15px;
        color: #222;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- 메인 제목 -->
      <h1>한국의 사계</h1>

      <div class="link-section">
        <!-- 상단 선 -->
        <hr class="divider" />

        <!-- 계절별 하이퍼링크 리스트 -->
        <ul class="season-list">
          <li><a href="ai_spring.html">봄의 계절</a></li>
          <li><a href="ai_summer.html">여름의 계절</a></li>
          <li><a href="ai_fall.html">가을의 계절</a></li>
          <li><a href="ai_winter.html">겨울의 계절</a></li>
        </ul>

        <!-- 하단 선 -->
        <hr class="divider" />
      </div>

      <!-- 하단 카피라이트 -->
      <div class="footer-text">Copyrightⓒgeona 2020 All Reserved.</div>
    </div>
  </body>
</html>
