<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>맛있는 경기</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --header-height: 120px;
        --map-top-gap: 18px;
        --map-sheet-gap: 16px;
        --sheet-bottom: 72px;
        --sheet-collapsed-height: 336px;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR",
          sans-serif;
        background: #fff;
        color: #333;
      }

      button,
      input,
      textarea {
        font-family: inherit;
      }

      button {
        border: 0;
        background: none;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }

      .app {
        width: 100%;
        max-width: 440px;
        min-height: 100vh;
        margin: 0 auto;
        background: #fff;
        overflow-x: hidden;
      }

      .page {
        display: none;
        min-height: 100vh;
        padding-bottom: 88px;
      }

      .page.active {
        display: block;
        animation: fadeIn 0.25s ease both;
      }

      .header {
        position: sticky;
        top: 0;
        z-index: 30;
        padding: 16px 16px 14px;
        background: rgba(255, 255, 255, 0.96);
        border-bottom: 1px solid #f3f3f3;
        backdrop-filter: blur(12px);
      }

      .title-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }

      .logo {
        font-size: 26px;
        font-weight: 900;
        letter-spacing: -1px;
        line-height: 1;
      }

      .logo .blue {
        color: #154a9b;
      }

      .logo .green {
        color: #16933b;
      }

      .header-icons {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .icon-btn {
        width: 26px;
        height: 26px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #222;
        border-radius: 50%;
        transition:
          transform 0.18s ease,
          background 0.18s ease;
      }

      .icon-btn:active {
        transform: scale(0.88);
        background: #f1f1f1;
      }

      .icon-btn svg {
        width: 24px;
        height: 24px;
        stroke-width: 2.2;
      }

      .icon-btn.active {
        color: #154a9b;
        background: transparent;
      }

      .icon-btn.active svg {
        fill: #154a9b;
        stroke: #154a9b;
      }

      .search-box {
        position: relative;
      }

      .search-icon {
        position: absolute;
        left: 17px;
        top: 50%;
        width: 22px;
        height: 22px;
        transform: translateY(-50%);
        color: #333;
      }

      .search-box input {
        width: 100%;
        height: 48px;
        border: 1px solid #f0f0f0;
        border-radius: 24px;
        padding: 0 48px 0 56px;
        color: #333;
        font-size: 15px;
        font-weight: 700;
        outline: none;
        background: #fff;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      .search-box input:focus {
        border-color: #154a9b;
        box-shadow: 0 8px 20px rgba(21, 74, 155, 0.08);
      }

      .search-box input::placeholder {
        color: #e2e2e2;
      }

      .clear-search-btn {
        position: absolute;
        right: 14px;
        top: 50%;
        width: 26px;
        height: 26px;
        transform: translateY(-50%);
        border-radius: 50%;
        background: #f1f1f1;
        color: #777;
        font-size: 18px;
        font-weight: 800;
        line-height: 1;
        display: none;
        align-items: center;
        justify-content: center;
      }

      .clear-search-btn.show {
        display: inline-flex;
      }

      .map-hero {
        width: calc(100% - 32px);
        height: clamp(
          220px,
          calc(
            100dvh - var(--header-height) - var(--map-top-gap) -
              var(--sheet-bottom) - var(--sheet-collapsed-height) -
              var(--map-sheet-gap)
          ),
          430px
        );
        margin: var(--map-top-gap) 16px 0;
        border-radius: 16px;
        overflow: hidden;
        background: #f3f3f3;
      }

      .map-hero #mainMap {
        width: 100%;
        height: 100%;
      }

      .main-list-card {
        position: fixed;
        left: 50%;
        top: var(--header-height);
        bottom: var(--sheet-bottom);
        z-index: 40;
        width: calc(100% - 32px);
        max-width: 408px;
        height: auto;
        margin: 0;
        padding: 34px 15px 18px;
        border: 1px solid #eee;
        border-radius: 18px 18px 0 0;
        background: #fff;
        overflow-y: auto;
        overscroll-behavior: contain;
        transform: translate(-50%, calc(100% - var(--sheet-collapsed-height)));
        transition:
          transform 0.34s cubic-bezier(0.22, 1, 0.36, 1),
          box-shadow 0.24s ease;
        box-shadow: 0 -8px 28px rgba(0, 0, 0, 0.04);
        touch-action: pan-y;
      }

      .main-list-card.expanded {
        transform: translate(-50%, 0);
        box-shadow: 0 -12px 34px rgba(0, 0, 0, 0.08);
      }

      .main-list-card::before {
        content: "";
        position: absolute;
        top: 8px;
        left: 50%;
        width: 24px;
        height: 3px;
        transform: translateX(-50%);
        border-radius: 2px;
        background: #154a9b;
      }

      .sheet-touch-area {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 32px;
        cursor: grab;
      }

      .food-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .food-card {
        position: relative;
        display: block;
        min-height: 120px;
        padding: 18px 116px 18px 16px;
        border: 1px solid #f0f0f0;
        border-radius: 16px;
        background: #fff;
        opacity: 0;
        transform: translateY(14px);
        animation: cardUp 0.35s ease forwards;
        transition:
          background 0.2s ease,
          box-shadow 0.2s ease,
          border-color 0.2s ease;
      }

      .food-card:active {
        border-color: #e4e4e4;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
      }

      .food-card.selected {
        background: #f4f8ff;
        border-color: rgba(21, 74, 155, 0.28);
        box-shadow: 0 0 0 2px rgba(21, 74, 155, 0.12);
      }

      .food-card:nth-child(1) {
        animation-delay: 0.02s;
      }
      .food-card:nth-child(2) {
        animation-delay: 0.06s;
      }
      .food-card:nth-child(3) {
        animation-delay: 0.1s;
      }
      .food-card:nth-child(4) {
        animation-delay: 0.14s;
      }

      .thumb {
        display: none;
      }

      .food-info {
        min-width: 0;
      }

      .food-name {
        margin-bottom: 12px;
        color: #333;
        font-size: 20px;
        line-height: 1.2;
        font-weight: 900;
        letter-spacing: -0.8px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .food-meta {
        display: flex;
        gap: 4px;
        margin-bottom: 5px;
        color: #999;
        font-size: 14px;
        line-height: 1.25;
        font-weight: 800;
        letter-spacing: -0.5px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .food-meta strong {
        flex: 0 0 auto;
        color: #222;
        font-weight: 900;
      }

      .food-meta span {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .card-actions {
        position: absolute;
        right: 18px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 0;
      }

      .small-icon-btn {
        width: 26px;
        height: 26px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #000;
        transition: transform 0.18s ease;
      }

      .small-icon-btn:active {
        transform: scale(0.85);
      }

      .small-icon-btn svg {
        width: 23px;
        height: 23px;
        stroke-width: 2.2;
      }

      .small-icon-btn.liked svg {
        fill: #111;
      }

      .pagination-wrap {
        padding: 18px 0 4px;
      }

      .pagination {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
      }

      .page-btn {
        min-width: 34px;
        height: 34px;
        padding: 0 9px;
        border: 1px solid #eee;
        border-radius: 8px;
        background: #fff;
        color: #333;
        font-size: 13px;
        font-weight: 800;
      }

      .page-btn.active {
        background: #154a9b;
        border-color: #154a9b;
        color: #fff;
      }

      .page-btn:disabled {
        opacity: 0.35;
      }

      .page-info {
        margin-top: 7px;
        color: #999;
        font-size: 12px;
        font-weight: 700;
        text-align: center;
      }

      .bottom-tabs {
        position: fixed;
        left: 50%;
        bottom: 0;
        z-index: 50;
        width: 100%;
        max-width: 440px;
        transform: translateX(-50%);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 28px;
        padding: 10px 16px 14px;
        background: linear-gradient(to top, #fff 82%, rgba(255, 255, 255, 0));
        transition:
          opacity 0.22s ease,
          transform 0.22s ease;
      }

      .bottom-tabs.hide {
        opacity: 0;
        pointer-events: none;
        transform: translateX(-50%) translateY(18px);
      }

      .bottom-tabs.detail-bottom {
        opacity: 0;
        pointer-events: none;
        transform: translateX(-50%) translateY(18px);
      }

      .bottom-tabs.detail-bottom.show {
        opacity: 1;
        pointer-events: auto;
        transform: translateX(-50%) translateY(0);
      }

      .tab-btn {
        height: 44px;
        border: 1px solid #eee;
        border-radius: 5px;
        background: #fff;
        color: #333;
        font-size: 15px;
        font-weight: 900;
        letter-spacing: -0.4px;
        box-shadow: 0 -2px 16px rgba(255, 255, 255, 0.75);
      }

      .tab-btn.active {
        background: #154a9b;
        border-color: #154a9b;
        color: #fff;
      }

      .loading,
      .empty,
      .error {
        padding: 45px 10px;
        color: #888;
        text-align: center;
        line-height: 1.5;
        font-weight: 800;
      }

      .loading::before {
        content: "";
        display: block;
        width: 28px;
        height: 28px;
        margin: 0 auto 14px;
        border: 3px solid #eee;
        border-top-color: #154a9b;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      .back-btn {
        position: fixed;
        left: max(16px, calc(50% - 204px));
        top: 12px;
        z-index: 80;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        display: none;
        align-items: center;
        justify-content: center;
      }

      .back-btn.show {
        display: inline-flex;
        animation: fabIn 0.22s ease both;
      }

      .back-btn svg {
        width: 24px;
        height: 24px;
      }

      .detail-hero {
        width: calc(100% - 32px);
        height: 424px;
        margin: 16px 16px 0;
        border-radius: 16px;
        overflow: hidden;
        background: #f4f4f4;
      }

      .detail-hero img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }

      .detail-tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 28px;
        padding: 16px 16px 16px;
      }

      .detail-tab-btn {
        height: 44px;
        border: 1px solid #eee;
        border-radius: 6px;
        background: #fff;
        color: #333;
        font-size: 16px;
        font-weight: 900;
        letter-spacing: -0.5px;
      }

      .detail-tab-btn.active {
        background: #154a9b;
        border-color: #154a9b;
        color: #fff;
      }

      .detail-panel {
        display: none;
      }

      .detail-panel.active {
        display: block;
        animation: fadeIn 0.24s ease both;
      }

      .detail-content {
        padding: 0 16px 28px;
      }

      .detail-title {
        margin-bottom: 12px;
        color: #333;
        font-size: 22px;
        line-height: 1.2;
        font-weight: 900;
        letter-spacing: -0.7px;
      }

      .detail-like-line {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
        color: #111;
        font-size: 16px;
        font-weight: 900;
        cursor: pointer;
      }

      .detail-like-line svg {
        width: 25px;
        height: 25px;
        stroke-width: 2.1;
      }

      .detail-like-line.liked {
        color: #154a9b;
      }

      .detail-like-line.liked svg {
        fill: #154a9b;
        stroke: #154a9b;
      }

      .detail-desc {
        margin-bottom: 14px;
        color: #333;
        font-size: 16px;
        line-height: 1.42;
        letter-spacing: -0.4px;
        word-break: keep-all;
      }

      .label {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        margin: 0 0 9px;
        padding: 5px 10px;
        border-radius: 5px;
        background: #154a9b;
        color: #fff;
        font-size: 14px;
        font-weight: 900;
        letter-spacing: -0.4px;
      }

      .detail-text {
        margin-bottom: 14px;
        color: #444;
        font-size: 16px;
        line-height: 1.45;
        letter-spacing: -0.4px;
      }

      .detail-map {
        width: calc(100% - 32px);
        height: 210px;
        margin: 4px 16px 10px;
        border-radius: 16px;
        background: #f1f1f1;
        overflow: hidden;
      }

      .direction-wrap {
        width: calc(100% - 32px);
        margin: 0 16px 30px;
        display: flex;
        justify-content: flex-end;
      }

      .direction-btn {
        height: 36px;
        min-width: 92px;
        padding: 0 14px;
        border-radius: 18px;
        background: #154a9b;
        color: #fff;
        font-size: 13px;
        font-weight: 900;
        letter-spacing: -0.4px;
      }

      .review-list {
        padding: 0 16px 18px;
      }

      .review-card {
        padding: 16px 0 17px;
        border-bottom: 1px solid #cfcfcf;
        animation: cardUp 0.3s ease both;
      }

      .review-head {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 24px;
        color: #111;
        font-size: 20px;
        font-weight: 900;
        letter-spacing: -0.5px;
      }

      .review-stars {
        color: #154a9b;
        font-size: 18px;
        letter-spacing: 2px;
        white-space: nowrap;
      }

      .review-text {
        color: #333;
        font-size: 16px;
        line-height: 1.45;
        letter-spacing: -0.4px;
        word-break: keep-all;
      }

      .review-bottom-action {
        padding: 0 16px 96px;
      }

      .review-write-bottom-btn {
        width: 100%;
        height: 48px;
        border-radius: 8px;
        background: #154a9b;
        color: #fff;
        font-size: 16px;
        font-weight: 900;
        letter-spacing: -0.5px;
      }

      .review-write-fab {
        position: fixed;
        right: max(16px, calc(50% - 204px));
        bottom: 86px;
        z-index: 75;
        width: 48px;
        height: 48px;
        border: 1px solid #eee;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        display: none;
        align-items: center;
        justify-content: center;
      }

      .review-write-fab.show {
        display: inline-flex;
        animation: fabIn 0.22s ease both;
      }

      .review-write-fab svg {
        width: 24px;
        height: 24px;
        stroke-width: 2.4;
      }

      .write-page {
        padding: 16px;
      }

      .write-title {
        margin: 54px 0 8px;
        color: #222;
        font-size: 26px;
        font-weight: 900;
        letter-spacing: -0.8px;
      }

      .write-subtitle {
        margin-bottom: 28px;
        color: #888;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: -0.4px;
      }

      .write-field {
        margin-bottom: 18px;
      }

      .write-label {
        display: block;
        margin-bottom: 10px;
        color: #333;
        font-size: 16px;
        font-weight: 900;
      }

      .fixed-user-name {
        min-height: 48px;
        border: 1px solid #eee;
        border-radius: 14px;
        padding: 14px;
        color: #222;
        background: #fafafa;
        font-size: 16px;
        font-weight: 800;
      }

      .write-textarea {
        width: 100%;
        min-height: 150px;
        border: 1px solid #eee;
        border-radius: 14px;
        padding: 14px;
        color: #222;
        font-size: 16px;
        font-weight: 700;
        line-height: 1.5;
        outline: none;
        resize: none;
      }

      .write-textarea:focus {
        border-color: #154a9b;
        box-shadow: 0 8px 22px rgba(21, 74, 155, 0.08);
      }

      .rating-select {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 10px 12px;
        border: 1px solid #eee;
        border-radius: 14px;
        background: #fff;
      }

      .rating-star {
        width: 34px;
        height: 34px;
        color: #d7d7d7;
        font-size: 30px;
        line-height: 1;
        font-weight: 900;
      }

      .rating-star.active {
        color: #154a9b;
      }

      .rating-guide {
        margin-top: 8px;
        color: #999;
        font-size: 13px;
        font-weight: 700;
      }

      .write-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 26px;
      }

      .write-action-btn {
        height: 48px;
        border: 1px solid #eee;
        border-radius: 8px;
        background: #fff;
        color: #333;
        font-size: 16px;
        font-weight: 900;
      }

      .write-action-btn.primary {
        border-color: #154a9b;
        background: #154a9b;
        color: #fff;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 72px;
        z-index: 100;
        min-width: 160px;
        max-width: calc(100% - 48px);
        padding: 12px 16px;
        transform: translate(-50%, 16px);
        border-radius: 22px;
        background: rgba(35, 35, 35, 0.94);
        color: #fff;
        font-size: 14px;
        font-weight: 900;
        text-align: center;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.2s ease,
          transform 0.2s ease;
      }

      .toast.show {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes cardUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fabIn {
        from {
          opacity: 0;
          transform: translateY(12px) scale(0.86);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <button class="back-btn" id="backBtn" type="button" aria-label="뒤로가기">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </button>

      <section class="page active" id="mainPage">
        <header class="header">
          <div class="title-row">
            <h1 class="logo">
              <span class="blue">맛있는</span> <span class="green">경기</span>
            </h1>
            <div class="header-icons">
              <button
                class="icon-btn"
                id="refreshBtn"
                type="button"
                aria-label="새로고침"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
                  <path d="M21 3v6h-6"></path>
                </svg>
              </button>
              <button
                class="icon-btn"
                id="topLikeBtn"
                type="button"
                aria-label="즐겨찾기"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"
                  ></path>
                </svg>
              </button>
              <button
                class="icon-btn"
                id="myLocationBtn"
                type="button"
                aria-label="현재 위치 보기"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M12 2v3"></path>
                  <path d="M12 19v3"></path>
                  <path d="M2 12h3"></path>
                  <path d="M19 12h3"></path>
                  <circle cx="12" cy="12" r="7"></circle>
                  <circle cx="12" cy="12" r="2"></circle>

      function getValue(item, keys, fallback = "") {
        for (const key of keys) {
          if (
            item[key] !== undefined &&
            item[key] !== null &&

            return String(item[key]).trim();

          "대표 메뉴 정보 없음",

        const tel = getValue(

        );
        const city = getValue(item, ["SIGUN_NM", "SIGNGU_NM"], "경기도");

            "REFINE_WGS84_LOGT",
            "REFINE_WGS84_LNG",
            "LNG",
            "LONGITUDE",
            "X",
          ]),
        );
        const id = getValue(
          item,
          ["RESTRT_NM", "BIZPLC_NM", "PLACE_NM"],
          `${name}-${address}-${index}`,

      async function loadFoods() {
        foodList.innerHTML = `<div class="loading">맛집 정보를 불러오는 중입니다.</div>`;
        paginationWrap.style.display = "none";

        const params = new URLSearchParams({
          KEY: API_KEY,
          Type: "json",
          pIndex: "1",
          pSize: "100",
        });

        try {
          const response = await fetch(`${API_URL}?${params.toString()}`);
          if (!response.ok) throw new Error("API 요청 실패");

          const data = await response.json();
          const rawItems = findItems(data);
          state.foods = rawItems.map(normalizeFood);

          if (!state.foods.length) throw new Error("데이터 없음");
          applyFilter();
          renderMainMap();
        } catch (error) {
          console.error(error);
          state.foods = makeSampleFoods();
          applyFilter();
          renderMainMap();
          showToast("샘플 데이터로 표시합니다");
        }
      }

      function findItems(data) {
        if (Array.isArray(data?.PlaceThatDoATasteyFoodSt?.[1]?.row))
          return data.PlaceThatDoATasteyFoodSt[1].row;
        if (Array.isArray(data?.PlaceThatDoATasteyFoodSt?.row))
          return data.PlaceThatDoATasteyFoodSt.row;
        if (Array.isArray(data?.row)) return data.row;

        const stack = [data];
        while (stack.length) {
          const current = stack.pop();
          if (!current || typeof current !== "object") continue;
          for (const value of Object.values(current)) {
            if (
              Array.isArray(value) &&
              value.length &&
              typeof value[0] === "object"
            )
              return value;
            if (value && typeof value === "object") stack.push(value);
          }
        }
        return [];
      }

              <div class="card-actions">
                <button class="small-icon-btn map-focus-btn" type="button" aria-label="지도에서 위치 보기">${iconLocation}</button>
                <button class="small-icon-btn detail-btn" type="button" aria-label="상세보기">${iconSearch}</button>
                <button class="small-icon-btn like-btn ${liked ? "liked" : ""}" type="button" aria-label="즐겨찾기">${iconHeart}</button>
              </div>
            </div>
          </article>
        `;
          })
          .join("");

        renderPagination(totalPages);
        paginationWrap.style.display = totalPages > 1 ? "block" : "none";
        pageInfo.textContent = "";
      }

      function renderPagination(totalPages) {
        const pages = getPageNumbers(totalPages, state.currentPage);
        pagination.innerHTML = `
        <button class="page-btn" type="button" data-page="prev" ${state.currentPage === 1 ? "disabled" : ""}>‹</button>
        ${pages.map((page) => `<button class="page-btn ${page === state.currentPage ? "active" : ""}" type="button" data-page="${page}">${page}</button>`).join("")}
        <button class="page-btn" type="button" data-page="next" ${state.currentPage === totalPages ? "disabled" : ""}>›</button>
      `;
      }

      function getPageNumbers(totalPages, currentPage) {
        const maxVisible = 7;
        let start = Math.max(1, currentPage - 2);
        let end = Math.min(totalPages, start + maxVisible - 1);
        if (end - start + 1 < maxVisible)
          start = Math.max(1, end - maxVisible + 1);
        const pages = [];
        for (let page = start; page <= end; page += 1) pages.push(page);
        return pages;
      }

      function movePage(page) {
        const activePageSize = state.isSheetExpanded
          ? state.pageSize
          : state.collapsedPageSize;
        const totalPages = Math.ceil(
          state.filteredFoods.length / activePageSize,
        );
        if (page === "prev") state.currentPage -= 1;
        else if (page === "next") state.currentPage += 1;
        else state.currentPage = Number(page);
        state.currentPage = Math.min(
          Math.max(state.currentPage, 1),
          totalPages,
        );
        renderList();
        renderMainMap({ keepView: true });
        mainListCard.scrollTo({ top: 0, behavior: "smooth" });
      }

      function expandFoodSheet() {
        const firstVisibleIndex =
          (state.currentPage - 1) * state.collapsedPageSize;
        state.currentPage = Math.floor(firstVisibleIndex / state.pageSize) + 1;
        state.isSheetExpanded = true;
        mainListCard.classList.add("expanded");
        renderList();
      }

      function collapseFoodSheet() {
        if (state.isSheetExpanded) {
          const firstVisibleIndex = (state.currentPage - 1) * state.pageSize;
          state.currentPage =
            Math.floor(firstVisibleIndex / state.collapsedPageSize) + 1;
        }

        state.isSheetExpanded = false;
        mainListCard.classList.remove("expanded");
        mainListCard.scrollTo({ top: 0, behavior: "auto" });
        renderList();
      }

      function toggleFoodSheet() {
        if (state.isSheetExpanded) {
          collapseFoodSheet();
        } else {
          expandFoodSheet();
        }
      }

      function renderMainMap(options = {}) {
        const mapBox = document.getElementById("mainMap");
        if (!window.kakao || !window.kakao.maps || !mapBox) return;

        const kakaoMaps = window.kakao.maps;
        const first = state.filteredFoods.find(
          (food) => Number.isFinite(food.lat) && Number.isFinite(food.lng),
        );
        const center = new kakaoMaps.LatLng(
          first?.lat || 37.4138,
          first?.lng || 127.5183,
        );

        if (!state.mainMap) {
          state.mainMap = new kakaoMaps.Map(mapBox, { center, level: 7 });
        } else if (!options.keepView) {
          state.mainMap.setCenter(center);
        }

        state.mainMarkers.forEach((marker) => marker.setMap(null));
        state.mainMarkers = [];

        const bounds = new kakaoMaps.LatLngBounds();
        let markerCount = 0;

        state.filteredFoods.forEach((food) => {
          if (!Number.isFinite(food.lat) || !Number.isFinite(food.lng)) return;

          const position = new kakaoMaps.LatLng(food.lat, food.lng);
          const marker = new kakaoMaps.Marker({
            position,
            map: state.mainMap,
            title: food.name,
          });

          kakaoMaps.event.addListener(marker, "click", () => {
            focusFoodFromMap(food.id);
          });

          bounds.extend(position);
          markerCount += 1;
          state.mainMarkers.push(marker);
        });

        if (!options.keepView) {
          if (markerCount > 1) {
            state.mainMap.setBounds(bounds);
          } else if (markerCount === 1) {
            state.mainMap.setCenter(bounds.getSouthWest());
            state.mainMap.setLevel(5);
          }
        }
      }

      function focusFoodFromMap(foodId) {
        const targetIndex = state.filteredFoods.findIndex(
          (food) => food.id === foodId,
        );
        const targetFood = state.filteredFoods[targetIndex];
        if (targetIndex === -1 || !targetFood) return;

        const activePageSize = state.isSheetExpanded
          ? state.pageSize
          : state.collapsedPageSize;
        state.selectedFoodId = foodId;
        state.currentPage = Math.floor(targetIndex / activePageSize) + 1;
        renderList();
        mainListCard.scrollTo({ top: 0, behavior: "smooth" });
        showToast(`${targetFood.name} 목록 위치로 이동했습니다`);
      }

      function focusMapFromCard(foodId) {
        const targetIndex = state.filteredFoods.findIndex(
          (food) => food.id === foodId,
        );
        const targetFood = state.filteredFoods[targetIndex];
        if (targetIndex === -1 || !targetFood) return;

        state.selectedFoodId = foodId;
        state.isSheetExpanded = false;
        state.currentPage =
          Math.floor(targetIndex / state.collapsedPageSize) + 1;
        mainListCard.classList.remove("expanded");
        mainListCard.scrollTo({ top: 0, behavior: "auto" });

        renderList();
        centerMainMap(targetFood);
        showToast(`${targetFood.name} 위치를 표시합니다`);
      }

      function centerMainMap(food) {
        if (!state.mainMap || !window.kakao || !window.kakao.maps) return;
        if (!Number.isFinite(food.lat) || !Number.isFinite(food.lng)) {
          showToast("좌표 정보가 없습니다");
          return;
        }

        const kakaoMaps = window.kakao.maps;
        const position = new kakaoMaps.LatLng(food.lat, food.lng);
        state.mainMap.relayout();
        state.mainMap.setLevel(4);
        state.mainMap.panTo(position);
      }

      function focusMyLocation() {
        if (!navigator.geolocation) {
          showToast("현재 위치를 지원하지 않는 브라우저입니다");
          return;
        }

        collapseFoodSheet();
        showToast("현재 위치를 확인하는 중입니다");

        navigator.geolocation.getCurrentPosition(
          (position) => {
            if (!window.kakao || !window.kakao.maps || !state.mainMap) return;

            const kakaoMaps = window.kakao.maps;
            const myPosition = new kakaoMaps.LatLng(
              position.coords.latitude,
              position.coords.longitude,
            );

            state.mainMap.relayout();
            state.mainMap.setLevel(5);
            state.mainMap.panTo(myPosition);

            if (state.myLocationMarker) {
              state.myLocationMarker.setMap(null);
            }

            state.myLocationMarker = new kakaoMaps.Marker({
              position: myPosition,
              map: state.mainMap,
              title: "현재 위치",
            });

            showToast("현재 위치를 표시했습니다");
          },
          () => {
            showToast("위치 권한을 허용해주세요");
          },
          {
            enableHighAccuracy: true,
            timeout: 6000,
            maximumAge: 30000,
          },
        );
      }

      function openDetail(foodId) {
        const food =
          state.filteredFoods.find((item) => item.id === foodId) ||
          state.foods.find((item) => item.id === foodId);
        if (!food) return;

        state.currentFoodId = foodId;
        state.currentRouteFood = food;

        detailImage.src = food.image;
        detailName.textContent = food.name;
        detailIntro.textContent = food.note;
        detailMenu.textContent = food.menu;
        detailTel.textContent = food.tel;
        detailTime.textContent = food.time;
        detailAddress.textContent = food.address;
        updateDetailLikeUI(food);

        mainPage.classList.remove("active");
        reviewWritePage.classList.remove("active");
        detailPage.classList.add("active");
        collapseFoodSheet();
        backBtn.classList.add("show");
        bottomTabs.classList.add("detail-bottom");
        bottomTabs.classList.remove("show");
        setDetailTab("info");
        window.scrollTo({ top: 0, behavior: "auto" });
        setTimeout(() => renderDetailMap(food), 120);
      }

      function closeDetail() {
        if (reviewWritePage.classList.contains("active")) {
          closeReviewWritePage();
          return;
        }

        detailPage.classList.remove("active");
        reviewWritePage.classList.remove("active");
        mainPage.classList.add("active");
        backBtn.classList.remove("show");
        reviewWriteFab.classList.remove("show");
        bottomTabs.classList.remove("hide", "detail-bottom", "show");
        state.currentFoodId = null;
        state.detailTab = "info";
        window.scrollTo({ top: 0, behavior: "auto" });
        setTimeout(renderMainMap, 80);
      }

      function setDetailTab(tab) {
        state.detailTab = tab;
        const isInfo = tab === "info";
        infoDetailTab.classList.toggle("active", isInfo);
        reviewDetailTab.classList.toggle("active", !isInfo);
        infoPanel.classList.toggle("active", isInfo);
        reviewPanel.classList.toggle("active", !isInfo);
        reviewWriteFab.classList.toggle(
          "show",
          !isInfo && detailPage.classList.contains("active"),
        );
        if (!isInfo) renderReviews();
      }

      function renderDetailMap(food) {
        const mapBox = document.getElementById("detailMap");
        if (!window.kakao || !window.kakao.maps || !mapBox) return;

        const kakaoMaps = window.kakao.maps;
        mapBox.innerHTML = "";
        const lat = Number.isFinite(food.lat) ? food.lat : 37.4138;
        const lng = Number.isFinite(food.lng) ? food.lng : 127.5183;
        const position = new kakaoMaps.LatLng(lat, lng);

        state.detailMap = new kakaoMaps.Map(mapBox, {
          center: position,
          level: 4,
        });
        state.detailMarker = new kakaoMaps.Marker({
          position,
          map: state.detailMap,
        });

        if (!Number.isFinite(food.lat) || !Number.isFinite(food.lng)) {
          if (!kakaoMaps.services || !kakaoMaps.services.Geocoder) return;
          const geocoder = new kakaoMaps.services.Geocoder();
          geocoder.addressSearch(food.address, (result, status) => {
            if (status !== kakaoMaps.services.Status.OK || !result[0]) return;
            const searchedLat = Number(result[0].y);
            const searchedLng = Number(result[0].x);
            const searchedPosition = new kakaoMaps.LatLng(
              searchedLat,
              searchedLng,
            );
            state.currentRouteFood = {
              ...food,
              lat: searchedLat,
              lng: searchedLng,
            };
            state.detailMap.setCenter(searchedPosition);
            state.detailMarker.setPosition(searchedPosition);
          });
        }
      }

      function toggleLike(foodId, options = {}) {
        const set = new Set(state.likedIds);
        const willLike = !set.has(foodId);
        if (willLike) set.add(foodId);
        else set.delete(foodId);
        state.likedIds = [...set];
        localStorage.setItem(
          "gyeonggiLikedFoods",
          JSON.stringify(state.likedIds),
        );

        if (state.mode === "liked" && !willLike) applyFilter();
        else updateLikeButtons(foodId, willLike);

        const currentFood = state.foods.find((food) => food.id === foodId);
        if (currentFood && state.currentFoodId === foodId) {
          updateDetailLikeUI(currentFood);
        }

        if (!options.silent) {
          showToast(
            willLike ? "즐겨찾기에 추가했습니다" : "즐겨찾기에서 해제했습니다",
          );
        }
      }

      function updateDetailLikeUI(food) {
        const liked = state.likedIds.includes(food.id);
        detailLikeBtn.classList.toggle("liked", liked);
        detailLikeCount.textContent = liked
          ? food.likeCount + 1
          : food.likeCount;
      }

      function updateLikeButtons(foodId, liked) {
        document.querySelectorAll(".food-card").forEach((card) => {
          if (card.dataset.id !== foodId) return;
          const likeButton = card.querySelector(".like-btn");
          if (likeButton) likeButton.classList.toggle("liked", liked);
        });
      }

      function setMode(mode) {
        state.mode = mode;
        state.isSheetExpanded = false;
        mainListCard.classList.remove("expanded");
        mainListCard.scrollTo({ top: 0, behavior: "auto" });

        allTab.classList.toggle("active", mode === "all");
        likeTab.classList.toggle("active", mode === "liked");
        topLikeBtn.classList.toggle("active", mode === "liked");
        applyFilter();
      }

      function toggleTopLikeMode() {
        if (
          detailPage.classList.contains("active") ||
          reviewWritePage.classList.contains("active")
        ) {
          closeDetail();
        }

        if (state.mode === "liked") {
          setMode("all");
        } else {
          setMode("liked");
        }
      }

      function clearSearch() {
        searchInput.value = "";
        state.keyword = "";
        applyFilter();
      }

      function updateClearSearchButton() {
        clearSearchBtn.classList.toggle(
          "show",
          Boolean(searchInput.value || state.keyword),
        );
      }

      function getReviews(foodId) {
        if (!state.reviews[foodId]) {
          state.reviews[foodId] = defaultReviewTexts.map((text, index) => ({
            id: `${foodId}-default-${index}`,
            name: index % 2 === 0 ? "dsa******" : "use****",
            rating: index === 1 ? 4 : 5,
            text,
          }));
          saveReviews();
        }
        return state.reviews[foodId];
      }

      function renderReviews() {
        if (!state.currentFoodId) return;
        const reviews = getReviews(state.currentFoodId);
        reviewList.innerHTML = reviews
          .map(
            (review) => `
        <article class="review-card">
          <div class="review-head">
            <span>${escapeHtml(review.name)}</span>
            <span class="review-stars">${"★".repeat(review.rating)}</span>
          </div>
          <p class="review-text">${escapeHtml(review.text)}</p>
        </article>
      `,
          )
          .join("");
      }

      function openReviewWritePage() {
        const food = state.foods.find(
          (item) => item.id === state.currentFoodId,
        );
        if (!food) return;

        detailPage.classList.remove("active");
        reviewWritePage.classList.add("active");
        bottomTabs.classList.add("hide");
        reviewWriteFab.classList.remove("show");
        backBtn.classList.add("show");
        writeFoodName.textContent = `${food.name} 리뷰를 작성해주세요.`;
        reviewTextInput.value = "";
        setRating(5);
        window.scrollTo({ top: 0, behavior: "auto" });
      }

      function closeReviewWritePage() {
        reviewWritePage.classList.remove("active");
        detailPage.classList.add("active");
        bottomTabs.classList.remove("hide");
        bottomTabs.classList.add("detail-bottom");
        bottomTabs.classList.remove("show");
        setDetailTab("review");
        window.scrollTo({ top: 0, behavior: "auto" });
      }

      function setRating(rating) {
        state.reviewRating = rating;
        document.querySelectorAll(".rating-star").forEach((button) => {
          button.classList.toggle(
            "active",
            Number(button.dataset.rating) <= rating,
          );
        });
        ratingGuide.textContent = `${rating}점 선택됨`;
      }

      function saveReview(event) {
        event.preventDefault();
        if (!state.currentFoodId) return;
        const text = reviewTextInput.value.trim();
        if (!text) {
          showToast("리뷰 내용을 입력해주세요");
          return;
        }

        const reviews = getReviews(state.currentFoodId);
        state.reviews[state.currentFoodId] = [
          {
            id: `${state.currentFoodId}-${Date.now()}`,
            name: "use****",
            rating: state.reviewRating,
            text,
          },
          ...reviews,
        ];
        saveReviews();
        closeReviewWritePage();
        showToast("리뷰가 등록되었습니다");
      }

      function saveReviews() {
        localStorage.setItem(
          "gyeonggiFoodReviews",
          JSON.stringify(state.reviews),
        );
      }

      function openDirection() {
        const food = state.currentRouteFood;
        if (!food) return;

        const destinationName = encodeURIComponent(food.name);
        const destinationAddress = encodeURIComponent(food.address);
        const hasCoords =
          Number.isFinite(food.lat) && Number.isFinite(food.lng);

        const openRoute = (startLat, startLng) => {
          const url = hasCoords
            ? `https://map.kakao.com/link/from/내위치,${startLat},${startLng}/to/${destinationName},${food.lat},${food.lng}`
            : `https://map.kakao.com/link/search/${destinationAddress}`;
          window.open(url, "_blank");
        };

        if (!navigator.geolocation) {
          window.open(
            `https://map.kakao.com/link/search/${destinationAddress}`,
            "_blank",
          );
          return;
        }

        showToast("현재 위치를 확인하는 중입니다");
        navigator.geolocation.getCurrentPosition(
          (position) =>
            openRoute(position.coords.latitude, position.coords.longitude),
          () => {
            showToast("위치 권한을 허용해주세요");
            window.open(
              `https://map.kakao.com/link/search/${destinationAddress}`,
              "_blank",
            );
          },
          { enableHighAccuracy: true, timeout: 6000, maximumAge: 30000 },
        );
      }

      function updateBottomTabsOnScroll() {
        if (!detailPage.classList.contains("active")) return;
        const scrollBottom = window.scrollY + window.innerHeight;
        const pageBottom = document.documentElement.scrollHeight - 24;
        bottomTabs.classList.toggle("show", scrollBottom >= pageBottom);
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        clearTimeout(state.toastTimer);
        state.toastTimer = setTimeout(
          () => toast.classList.remove("show"),
          1300,
        );
      }

      function escapeHtml(text) {
        return String(text)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      searchForm.addEventListener("submit", (event) => {
        event.preventDefault();
        state.keyword = searchInput.value;
        applyFilter();
      });

      searchInput.addEventListener("input", () => {
        state.keyword = searchInput.value;
        applyFilter();
      });

      clearSearchBtn.addEventListener("click", clearSearch);

      document.querySelector(".header").addEventListener("click", (event) => {
        if (event.target.closest("button") || event.target.closest("input"))
          return;
        if (state.isSheetExpanded) collapseFoodSheet();
      });

      sheetTouchArea.addEventListener("click", (event) => {
        event.stopPropagation();
        toggleFoodSheet();
      });

      mainListCard.addEventListener(
        "touchstart",
        (event) => {
          state.sheetStartY = event.touches[0].clientY;
        },
        { passive: true },
      );

      mainListCard.addEventListener(
        "touchend",
        (event) => {
          const endY = event.changedTouches[0].clientY;
          const diffY = endY - state.sheetStartY;

          if (diffY < -45) {
            expandFoodSheet();
          }

          if (diffY > 45 && mainListCard.scrollTop <= 4) {
            collapseFoodSheet();
          }
        },
        { passive: true },
      );
      refreshBtn.addEventListener("click", loadFoods);
      topLikeBtn.addEventListener("click", toggleTopLikeMode);
      myLocationBtn.addEventListener("click", focusMyLocation);
      backBtn.addEventListener("click", closeDetail);
      directionBtn.addEventListener("click", openDirection);
      detailLikeBtn.addEventListener("click", () => {
        if (!state.currentFoodId) return;
        toggleLike(state.currentFoodId, { silent: true });
      });

      allTab.addEventListener("click", () => {
        if (
          detailPage.classList.contains("active") ||
          reviewWritePage.classList.contains("active")
        )
          closeDetail();
        setMode("all");
      });

      likeTab.addEventListener("click", () => {
        if (
          detailPage.classList.contains("active") ||
          reviewWritePage.classList.contains("active")
        )
          closeDetail();
        setMode("liked");
      });

      foodList.addEventListener("click", (event) => {
        const card = event.target.closest(".food-card");
        if (!card) return;
        const foodId = card.dataset.id;

        if (event.target.closest(".like-btn")) {
          toggleLike(foodId);
          return;
        }

        if (event.target.closest(".map-focus-btn")) {
          focusMapFromCard(foodId);
          return;
        }

        openDetail(foodId);
      });

      pagination.addEventListener("click", (event) => {
        const button = event.target.closest(".page-btn");
        if (!button || button.disabled) return;
        movePage(button.dataset.page);
      });

      infoDetailTab.addEventListener("click", () => setDetailTab("info"));
      reviewDetailTab.addEventListener("click", () => setDetailTab("review"));
      reviewWriteFab.addEventListener("click", openReviewWritePage);
      reviewWriteBottomBtn.addEventListener("click", openReviewWritePage);
      cancelReviewBtn.addEventListener("click", closeReviewWritePage);
      reviewForm.addEventListener("submit", saveReview);

      ratingSelect.addEventListener("click", (event) => {
        const button = event.target.closest(".rating-star");
        if (!button) return;
        setRating(Number(button.dataset.rating));
      });

      window.addEventListener("scroll", updateBottomTabsOnScroll);
      window.addEventListener("resize", updateMainLayoutVariables);
      updateMainLayoutVariables();
      loadFoods();
    </script>
  </body>
</html>
