<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>전국 캠핑장 검색</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body>
    <div id="app">
      <section class="screen screen-search active" id="searchScreen">
        <main class="search-page">
          <div class="search-row">
            <form id="searchForm" class="search-form">
              <input
                type="search"
                id="searchInput"
                placeholder="지역 또는 캠핑장명을 입력하세요."
                autocomplete="off"
              />
            </form>

            <button
              type="button"
              class="map-icon-btn"
              id="openMapBtn"
              aria-label="전국 캠핑장 지도 보기"
            >
              <svg viewBox="0 0 24 24">
                <path
                  d="M9 18L3 21V6L9 3M9 18L15 21M9 18V3M15 21L21 18V3L15 6M15 21V6M15 6L9 3"
                />
              </svg>
            </button>
          </div>

          <section class="keyword-section">
            <div class="section-head">
              <h2>최근 검색어</h2>
              <button type="button" id="clearRecentBtn">전체 삭제</button>
            </div>
            <div class="keyword-list primary" id="recentKeywordsTop"></div>
          </section>

          <section class="keyword-section second">
            <h2>추천 검색어</h2>
            <div class="keyword-list gray" id="recentKeywordsBottom"></div>
          </section>
        </main>
      </section>

      <section class="screen screen-list" id="listScreen">
        <header class="app-header">
          <button type="button" class="back-btn" data-back="search">
            <svg viewBox="0 0 24 24">
              <path d="M15 18L9 12L15 6" />
            </svg>
          </button>
          <h1 id="listTitle">검색 결과</h1>
          <div></div>
        </header>

        <main class="result-list" id="resultList"></main>
        <div class="loading" id="listLoading">캠핑장을 불러오는 중입니다.</div>
      </section>

      <section class="screen screen-favorites" id="favoriteScreen">
        <header class="app-header">
          <button type="button" class="back-btn" data-back="search">
            <svg viewBox="0 0 24 24">
              <path d="M15 18L9 12L15 6" />
            </svg>
          </button>
          <h1>즐겨찾기</h1>
          <button type="button" class="text-btn" id="clearFavoriteBtn">
            비우기
          </button>
        </header>

        <main class="result-list" id="favoriteList"></main>
      </section>

      <section class="screen screen-map" id="mapScreen">
        <header class="app-header">
          <button type="button" class="back-btn" data-back="search">
            <svg viewBox="0 0 24 24">
              <path d="M15 18L9 12L15 6" />
            </svg>
          </button>
          <h1>전국 캠핑장 지도</h1>
          <button type="button" class="text-btn" id="mapToListBtn">
            목록보기
          </button>
        </header>

        <div id="kakaoMap" class="kakao-map"></div>

        <div class="map-guide" id="mapGuide">
          전국 캠핑장 데이터를 불러오는 중입니다.
        </div>

        <div class="map-card-wrap" id="mapCardWrap"></div>
      </section>

      <section class="screen screen-detail" id="detailScreen">
        <header class="detail-header">
          <button type="button" class="back-btn" id="detailBackBtn">
            <svg viewBox="0 0 24 24">
              <path d="M15 18L9 12L15 6" />
            </svg>
          </button>
          <h1 id="detailTitle">캠핑장 정보</h1>
          <button type="button" class="text-btn" id="confirmBtn">
            선택완료
          </button>
        </header>

        <main id="detailContent"></main>
      </section>

      <nav class="bottom-nav">
        <button type="button" data-nav="home">
          <svg class="nav-svg" viewBox="0 0 24 24">
            <path d="M3 11L12 4L21 11V21H15V15H9V21H3V11Z" />
          </svg>
          <span>홈</span>
        </button>

        <button type="button" class="active" data-nav="search">
          <svg class="nav-svg" viewBox="0 0 24 24">
            <path
              d="M10.8 18.2C14.886 18.2 18.2 14.886 18.2 10.8C18.2 6.714 14.886 3.4 10.8 3.4C6.714 3.4 3.4 6.714 3.4 10.8C3.4 14.886 6.714 18.2 10.8 18.2Z"
            />
            <path d="M16.2 16.2L21 21" />
          </svg>
          <span>검색</span>
        </button>

        <button type="button" data-nav="map">
          <svg class="nav-svg" viewBox="0 0 24 24">
            <path
              d="M9 18L3 21V6L9 3M9 18L15 21M9 18V3M15 21L21 18V3L15 6M15 21V6M15 6L9 3"
            />
          </svg>
          <span>지도</span>
        </button>

        <button type="button" data-nav="favorites">
          <svg class="nav-svg" viewBox="0 0 24 24">
            <path
              d="M6 4.5C6 3.7 6.7 3 7.5 3H16.5C17.3 3 18 3.7 18 4.5V21L12 17.5L6 21V4.5Z"
            />
          </svg>
          <span>저장</span>
        </button>

        <button type="button" data-nav="my">
          <svg class="nav-svg" viewBox="0 0 24 24">
            <path
              d="M12 12C14.485 12 16.5 9.985 16.5 7.5C16.5 5.015 14.485 3 12 3C9.515 3 7.5 5.015 7.5 7.5C7.5 9.985 9.515 12 12 12Z"
            />
            <path
              d="M4.5 21C5.25 16.9 8.1 14.8 12 14.8C15.9 14.8 18.75 16.9 19.5 21"
            />
          </svg>
          <span>MY</span>
        </button>
      </nav>
    </div>

    <script src="./script/script.js"></script>
  </body>
</html>
