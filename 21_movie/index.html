<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>동영상 삽입</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <h1>홍보/마케팅 동영상</h1>
    <hr />
    <div class="imgbox">
      <img src="./images/img2.jpg" alt="" />
    </div>
    <!-- 동영상 삽입 -->
    <div class="movi_wrap">
      <div class="movi">
        <video autoplay muted loop controls="true">
          <source src="./movie/sample1.mp4" type="video/mp4" />
        </video>
      </div>
      <div class="movi">
        <video autoplay muted loop>
          <source src="./movie/sample2.mp4" type="video/mp4" />
        </video>
      </div>
      <div class="movi">
        <video autoplay muted loop>
          <source src="./movie/sample3.mp4" type="video/mp4" />
        </video>
      </div>
      <div class="movi">
        <video autoplay muted loop>
          <source src="./movie/sample4.mp4" type="video/mp4" />
        </video>
      </div>
    </div>
  </body>
</html>
