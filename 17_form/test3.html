<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>응용3</title>
    <link rel="stylesheet" href="./css/style4.css" />
  </head>
  <body>
    <form action="" name="tlscjd" method="post">
      <fieldset>
        <legend>신청과목</legend>
        <p>이달에 신청할 과목을 선택하세요 (1과목만 가능)</p>
        <input type="radio" name="sd" id="ghl" /><label for="ghl">회화</label>
        <input type="radio" name="sd" id="ans" /><label for="ans">문법</label>
        <input type="radio" name="sd" id="wkr" />
        <label for="wkr"> 작문</label>
      </fieldset>
    </form>
    <form action="" name="mailring" method="post">
      <fieldset>
        <legend>메일링</legend>
        <p>메일로 받고 싶은 뉴스 주제를 선택해 주세요(복수선택가능)</p>

        <input type="checkbox" id="godhl" name="chk" value="해외단신" />
        <label for="godhl">해외단신</label>
        <input type="checkbox" id="five" name="chk2" value="5분 회화" />
        <label for="five">5분 회화</label>
        <input type="checkbox" id="morning" name="chk3" value="모닝팝스" />
        <label for="morning">모닝팝스</label>
      </fieldset>
    </form>
  </body>
</html>
