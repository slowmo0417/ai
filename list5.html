<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>목록</title>
    <style>
      ol li {
        list-style: upper-roman;
      }
      ol li ul li {
        list-style: square;
      }
      ol li ol li {
        list-style: decimal;
      }
    </style>
  </head>
  <body>
    <h1>목록을 나타내는 리스트</h1>
    <ol>
      <li>
        액션
        <ul>
          <li>어벤져스</li>
          <li>분노의 질주</li>
          <li>옹박</li>
          <li>닌자어쌔신</li>
        </ul>
      </li>
      <li>
        스릴러
        <ol>
          <li>살인의 추억</li>
          <li>올드보이</li>
          <li>숨바꼭질</li>
          <li>이웃사람</li>
        </ol>
      </li>
    </ol>
  </body>
</html>
