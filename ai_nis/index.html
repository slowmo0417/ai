<!doctype html>
<html lang="ko">
  <head>

    <title>국가정보원 스타일 메인 섹션</title>
    <link rel="stylesheet" href="./css/style.css" />

  <body>
    <section class="hero">

          <div class="card-list">

              <div class="card-title">직무</div>
            </a>

            <a href="#" class="card">
              <div class="card-thumb">

            </a>

            <a href="#" class="card">
              <div class="card-thumb">
                <img src="./images/img_about_3.jpg" alt="관련 법령" />
              </div>

        </div>
