<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>태그 선택자</title>
  </head>
  <body>
    <h1>큰제목1</h1>
    <h1>큰제목2</h1>
    <h1>큰제목3</h1>
    <p>첫번째 문단</p>
    <script>
      let tit = document.getElementsByTagName("h1");
      console.log(tit);
      tit[0].style.color = "red";
      tit[1].style.color = "blue";
      tit[2].style.color = "green";

      let para = document.getElementsByTagName("p");
      console.log(para);
      para[0].style.fontSize = "36px";
    </script>
  </body>
</html>
