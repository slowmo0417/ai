<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>클래스선택자</title>
  </head>
  <body>
    <h1 class="txt">큰제목1</h1>
    <h1 class="txt">큰제목2</h1>
    <h1 class="txt">큰제목3</h1>
    <p class="ppp">문단</p>

    <script>
      let tit = document.getElementsByClassName("txt");
      console.log(tit);
      tit[0].style.border = "5px solid red";
      tit[1].style.border = "5px solid blue";
      tit[2].style.border = "5px solid green";

      let para = document.getElementsByClassName("ppp");
      para[0].style.border = "10px dotted #000";
    </script>
  </body>
</html>
