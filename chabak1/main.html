<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>캠핑 메인</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        font-family:
          -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
          "Noto Sans KR", "Segoe UI", sans-serif;
        background: #fff;
        color: #222;
      }

      body {
        display: flex;
        justify-content: center;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button {
        border: 0;
        background: none;
        font: inherit;
        cursor: pointer;
      }

      .app {
        position: relative;
        width: 100%;
        max-width: 430px;
        min-height: 100vh;
        background: #fff;
        overflow-x: hidden;
        padding-bottom: 86px;
      }

      .hero {
        position: relative;
        width: 100%;
        height: 367px;
        background: #fff;
        overflow: hidden;
        touch-action: pan-y;
      }

      .hero-track {
        display: flex;
        width: 100%;
        height: 100%;
        transition: transform 0.35s ease;
      }

      .hero-slide {
        flex: 0 0 100%;
        width: 100%;
        height: 100%;
      }

      .hero-slide img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        user-select: none;
        pointer-events: none;
      }

      .hero-pagination {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 14px;
        display: flex;
        justify-content: center;
        gap: 7px;
      }

      .hero-dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.65);
        transition:
          width 0.25s ease,
          background 0.25s ease;
      }

      .hero-dot.active {
        width: 18px;
        background: #5674b6;
      }

      .section {
        padding: 0 24px;
      }
      .section-title {
        margin: 28px 0 24px;
        color: #5674b6;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: -0.04em;
      }

      .category-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        row-gap: 24px;
      }

      .category-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        color: #5f5f5f;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: -0.04em;
      }

      .category-icon {
        width: 34px;
        height: 34px;
        object-fit: contain;
      }

      .quick-menu {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 11px;
        margin-top: 24px;
      }

      .quick-btn {
        height: 40px;
        border-radius: 5px;
        background: #f0f2f8;
        color: #5674b6;
        font-size: 15px;
        font-weight: 500;
        letter-spacing: -0.04em;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
      }

      .quick-btn svg {
        width: 22px;
        height: 22px;
        display: block;
      }
      .ranking-title {
        margin-top: 28px;
        margin-bottom: 24px;
        color: #5674b6;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: -0.04em;
      }

      .ranking-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px 12px;
      }

      .ranking-card {
        display: block;
        height: 200px;
        overflow: hidden;
        background: #fff;
      }

      .ranking-card.large {
        grid-column: 1 / -1;
        height: 180px;
      }
      .ranking-card img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .place-info-card {
        position: relative;
        padding-top: 24px;
        padding-right: 32px;
        padding-bottom: 18px;
      }
      .place-info-title {
        color: #222;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: -0.04em;
        margin-bottom: 12px;
      }

      .place-info-address {
        color: #606060;
        font-size: 12px;
        font-weight: 500;
        line-height: 1.4;
        letter-spacing: -0.04em;
      }

      .place-bookmark-btn {
        position: absolute;
        top: 24px;
        right: 0;
        width: 24px;
        height: 24px;
        color: #5674b6;
      }

      .place-bookmark-btn svg {
        width: 100%;
        height: 100%;
        stroke: currentColor;
        fill: transparent;
      }

      .place-bookmark-btn.is-active svg {
        fill: currentColor;
      }

      .place-action-row {
        display: grid;
        grid-template-columns: 56.6% 1fr;
        gap: 22px;
        padding-bottom: 14px;
      }

      .place-action-btn {
        height: 48px;
        border-radius: 5px;
        border: 1px solid #5674b6;
        color: #5674b6;
        background: #fff;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      .place-action-btn.primary {
        background: #5674b6;
        color: #fff;
      }

      .bottom-nav {
        position: fixed;
        left: 50%;
        bottom: 0;
        z-index: 20;
        width: 100%;
        max-width: 430px;
        height: 70px;
        transform: translateX(-50%);
        background: #fff;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        align-items: center;
      }

      .nav-item {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 5px;
        color: #d5d5d5;
        font-size: 12px;
        font-weight: 700;
      }

      .nav-item svg {
        width: 22px;
        height: 22px;
        stroke: currentColor;
      }

      .nav-item.active {
        color: #5674b6;
      }

      @media (max-width: 360px) {
        .section {
          padding: 0 24px;
        }

        .hero {
          height: 367px;
        }

        .quick-menu {
          gap: 8px;
        }

        .quick-btn {
          font-size: 14px;
        }
      }
    </style>
  </head>

              d="M10 13.5H14C17.5839 13.5 20.5 16.4161 20.5 20V21C20.5 21.2739 20.2739 21.5 20 21.5H4C3.72614 21.5 3.5 21.2739 3.5 21V20C3.5 16.4161 6.41614 13.5 10 13.5ZM10 14.5C6.96386 14.5 4.5 16.9639 4.5 20V20.5H19.5V20C19.5 16.9639 17.0361 14.5 14 14.5H10ZM12 2.5C14.4839 2.5 16.5 4.51614 16.5 7C16.5 9.48386 14.4839 11.5 12 11.5C9.51614 11.5 7.5 9.48386 7.5 7C7.5 4.51614 9.51614 2.5 12 2.5ZM12 3.5C10.0739 3.5 8.5 5.07386 8.5 7C8.5 8.92614 10.0739 10.5 12 10.5C13.9261 10.5 15.5 8.92614 15.5 7C15.5 5.07386 13.9261 3.5 12 3.5Z"
              stroke="currentColor"
            />
          </svg>
          <span>MY</span>
        </a>
      </nav>
    </main>

    <script>
      const navItems = document.querySelectorAll(".nav-item");
      const placeBookmarkBtn = document.querySelector(".place-bookmark-btn");
      const hero = document.querySelector(".hero");
      const heroTrack = document.querySelector(".hero-track");
      const originalHeroSlides = Array.from(
        document.querySelectorAll(".hero-slide"),
      );
      const heroDots = document.querySelectorAll(".hero-dot");

      let heroSlides = originalHeroSlides;
      let heroIndex = 1;
      let startX = 0;
      let currentX = 0;
      let isDragging = false;
      let heroTimer;
      let slideWidth = hero.clientWidth;

      function setupHeroLoop() {
        const firstClone = originalHeroSlides[0].cloneNode(true);
        const lastClone =
          originalHeroSlides[originalHeroSlides.length - 1].cloneNode(true);

        firstClone.classList.add("is-clone");
        lastClone.classList.add("is-clone");

        heroTrack.insertBefore(lastClone, originalHeroSlides[0]);
        heroTrack.appendChild(firstClone);

        heroSlides = Array.from(document.querySelectorAll(".hero-slide"));
        moveHeroToIndex(heroIndex, false);
      }

      function getRealHeroIndex() {
        if (heroIndex === 0) return originalHeroSlides.length - 1;
        if (heroIndex === heroSlides.length - 1) return 0;
        return heroIndex - 1;
      }

      function updateHeroDots() {
        const realIndex = getRealHeroIndex();

        heroDots.forEach((dot, index) => {
          dot.classList.toggle("active", index === realIndex);
        });
      }

      function moveHeroToIndex(index, useTransition = true) {
        heroIndex = index;
        heroTrack.style.transition = useTransition
          ? "transform 0.35s ease"
          : "none";
        heroTrack.style.transform = `translateX(-${heroIndex * 100}%)`;
        updateHeroDots();
      }

      function moveHeroSlider(direction) {
        moveHeroToIndex(heroIndex + direction);
      }

      function startHeroAutoSlide() {
        clearInterval(heroTimer);
        heroTimer = setInterval(() => {
          moveHeroSlider(1);
        }, 3000);
      }

      function stopHeroAutoSlide() {
        clearInterval(heroTimer);
      }

      heroTrack.addEventListener("transitionend", () => {
        if (heroIndex === heroSlides.length - 1) {
          moveHeroToIndex(1, false);
        }

        if (heroIndex === 0) {
          moveHeroToIndex(heroSlides.length - 2, false);
        }
      });

      hero.addEventListener("pointerdown", (event) => {
        startX = event.clientX;
        currentX = startX;
        slideWidth = hero.clientWidth;
        isDragging = true;
        stopHeroAutoSlide();
        hero.setPointerCapture(event.pointerId);
        heroTrack.style.transition = "none";
      });

      hero.addEventListener("pointermove", (event) => {
        if (!isDragging) return;

        currentX = event.clientX;
        const diffX = currentX - startX;
        const moveX = -heroIndex * slideWidth + diffX;
        heroTrack.style.transform = `translateX(${moveX}px)`;
      });

      hero.addEventListener("pointerup", () => {
        if (!isDragging) return;

        const diffX = currentX - startX;

        if (Math.abs(diffX) > 50) {
          if (diffX < 0) {
            moveHeroSlider(1);
          } else {
            moveHeroSlider(-1);
          }
        } else {
          moveHeroToIndex(heroIndex);
        }

        isDragging = false;
        startHeroAutoSlide();
      });

      hero.addEventListener("pointercancel", () => {
        if (!isDragging) return;

        isDragging = false;
        moveHeroToIndex(heroIndex);
        startHeroAutoSlide();
      });

      heroDots.forEach((dot, index) => {
        dot.addEventListener("click", () => {
          moveHeroToIndex(index + 1);
          startHeroAutoSlide();
        });
      });

      window.addEventListener("resize", () => {
        slideWidth = hero.clientWidth;
        moveHeroToIndex(heroIndex, false);
      });

      setupHeroLoop();
      startHeroAutoSlide();

      placeBookmarkBtn.addEventListener("click", () => {
        placeBookmarkBtn.classList.toggle("is-active");
      });

      navItems.forEach((item) => {
        item.addEventListener("click", (event) => {
          const href = item.getAttribute("href");

          if (href && href !== "#") {
            return;
          }

          event.preventDefault();
          navItems.forEach((nav) => nav.classList.remove("active"));
          item.classList.add("active");
        });
      });
    </script>
  </body>
</html>
