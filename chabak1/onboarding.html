<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Onboarding Slider</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        font-family:
          -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
          "Noto Sans KR", "Segoe UI", sans-serif;
        background: #fff;
        color: #2f4570;
        overflow: hidden;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .app {
        position: relative;
        width: 100%;
        height: 100vh;
        min-height: 640px;
        background: #fff;
        overflow: hidden;
      }

      .slider {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        touch-action: pan-y;
      }

      .track {
        position: relative;
        display: flex;
        width: 100%;
        height: 100%;
        transition: transform 0.45s ease;
        will-change: transform;
      }

      .slide {
        flex: 0 0 100%;
        position: relative;
        width: 100%;
        height: 100%;
        padding: 86px 24px 120px;
        overflow: hidden;
        z-index: 1;
      }

      .text-box {
        position: relative;
        z-index: 3;
      }

      .title {
        font-size: 26px;
        line-height: 1.28;
        font-weight: 500;
        letter-spacing: -0.8px;
        color: #314873;
      }

      .title strong {
        font-weight: 800;
      }

      .desc {
        margin-top: 18px;
        font-size: 17px;
        line-height: 1.36;
        font-weight: 600;
        letter-spacing: -0.4px;
        color: #9aacd2;
      }

      .visual-area {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 184px;
        height: 46vh;
        min-height: 300px;
        max-height: 420px;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        z-index: 2;
        overflow: visible;
      }

      .visual-area::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -1px;
        height: 82px;
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0),
          #fff 78%
        );
        z-index: 2;
        pointer-events: none;
      }

      .illustration {
        position: relative;
        z-index: 1;
        display: block;
        width: 90vw;
        max-width: 90%;
        max-height: 100%;
        object-fit: contain;
        user-select: none;
        -webkit-user-drag: none;
        pointer-events: none;
        filter: drop-shadow(0 18px 28px rgba(88, 113, 181, 0.08));
        -webkit-mask-image: linear-gradient(
          to bottom,
          #000 0%,
          #000 84%,
          rgba(0, 0, 0, 0) 100%
        );
        mask-image: linear-gradient(
          to bottom,
          #000 0%,
          #000 84%,
          rgba(0, 0, 0, 0) 100%
        );
      }

      .slide:nth-child(1) .illustration {
        transform: translateY(4px);
      }

      .slide:nth-child(3) .illustration {
        transform: translateY(8px);
      }

      .pagination {
        position: absolute;
        left: 50%;
        bottom: 102px;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        transform: translateX(-50%);
      }

      .dot {
        width: 10px;
        height: 10px;
        border: 0;
        border-radius: 50%;
        background: #d9dce1;
        cursor: pointer;
        transition:
          background 0.25s ease,
          transform 0.25s ease;
      }

      .dot.active {
        background: #5871b5;
        transform: scale(1.05);
      }

      .start-btn {
        position: absolute;
        left: 24px;
        right: 24px;
        bottom: 34px;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 49px;
        border-radius: 9px;
        background: #5871b5;
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.2px;
      }

      .start-btn:active {
        transform: translateY(1px);
        background: #4f68aa;
      }

      @media (max-width: 360px) {
        .app {
          min-height: 600px;
        }

        .slide {
          padding: 76px 22px 112px;
        }

        .title {
          font-size: 24px;
        }

        .desc {
          margin-top: 14px;
          font-size: 16px;
        }

        .visual-area {
          bottom: 172px;
          min-height: 270px;
        }

        .pagination {
          bottom: 94px;
        }

        .start-btn {
          left: 22px;
          right: 22px;
          bottom: 28px;
        }
      }

      @media (min-width: 480px) {
        .app {
          max-width: 430px;
          margin: 0 auto;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="slider" aria-label="온보딩 슬라이드">
        <div class="track">
          <article class="slide">
            <div class="text-box">
              <h1 class="title">차박,<br />어디로 떠나야 할지 모르겠나요?</h1>
              <p class="desc">
                지도 기반 위치 앱 및 키워드 검색으로<br />내가 원하는 장소를 한
                번에.
              </p>
            </div>

            <div class="visual-area">
              <img
                class="illustration"
                src="./images/img 1.png"
                alt="지도를 보며 차박 장소를 찾는 캐릭터"
              />
            </div>
          </article>

          <article class="slide">
            <div class="text-box">
              <h1 class="title">
                차만 있다면<br />장비는 가격부담 적은 <strong>렌탈로!</strong>
              </h1>
              <p class="desc">
                차박에 필요한 물품들을<br />용도 별로 둘러보세요.
              </p>
            </div>

            <div class="visual-area">
              <img
                class="illustration"
                src="./images/img 2.png"
                alt="차박 장비를 정리하는 캐릭터"
              />
            </div>
          </article>

          <article class="slide">
            <div class="text-box">
              <h1 class="title">
                일상이 바쁠 땐 실시간 <strong>라이브로</strong><br />대리만족해
                보세요.
              </h1>
              <p class="desc">
                라이브로 내 자랑 뽐내고<br />시청자들과 소통하는 즐거움.
              </p>
            </div>

            <div class="visual-area">
              <img
                class="illustration"
                src="./images/img 3.png"
                alt="캠핑 라이브 방송을 하는 캐릭터"
              />
            </div>
          </article>
        </div>

        <div class="pagination" aria-label="슬라이드 페이지">
          <button
            class="dot active"
            type="button"
            aria-label="1번 슬라이드"
          ></button>
          <button class="dot" type="button" aria-label="2번 슬라이드"></button>
          <button class="dot" type="button" aria-label="3번 슬라이드"></button>
        </div>
      </section>

      <a class="start-btn" href="./login.html">시작하기</a>
    </main>

    <script>
      const slider = document.querySelector(".slider");
      const track = document.querySelector(".track");
      const slides = Array.from(document.querySelectorAll(".slide"));
      const dots = Array.from(document.querySelectorAll(".dot"));
      const loginUrl = "./login.html";

      const slideSpeed = 450;
      const autoDelay = 2000;

      let currentIndex = 0;
      let startX = 0;
      let currentX = 0;
      let isDragging = false;
      let autoTimer = null;
      let redirectTimer = null;

      function updateDots(index) {
        dots.forEach((dot, dotIndex) => {
          dot.classList.toggle("active", dotIndex === index);
        });
      }

      function scheduleRedirect() {
        clearTimeout(redirectTimer);
        redirectTimer = setTimeout(() => {
          window.location.href = loginUrl;
        }, autoDelay);
      }

      function moveToSlide(index, useAnimation = true) {
        currentIndex = Math.max(0, Math.min(index, slides.length - 1));

        track.style.transition = useAnimation
          ? `transform ${slideSpeed}ms ease`
          : "none";
        track.style.transform = `translateX(-${currentIndex * 100}%)`;
        updateDots(currentIndex);

        if (currentIndex === slides.length - 1) {
          stopAutoSlide();
          scheduleRedirect();
        }
      }

      function startAutoSlide() {
        stopAutoSlide();
        clearTimeout(redirectTimer);

        autoTimer = setInterval(() => {
          if (currentIndex < slides.length - 1) {
            moveToSlide(currentIndex + 1);
          } else {
            stopAutoSlide();
            scheduleRedirect();
          }
        }, autoDelay);
      }

      function stopAutoSlide() {
        if (autoTimer) {
          clearInterval(autoTimer);
          autoTimer = null;
        }
      }

      function getClientX(event) {
        return event.touches ? event.touches[0].clientX : event.clientX;
      }

      function onDragStart(event) {
        isDragging = true;
        startX = getClientX(event);
        currentX = startX;
        track.style.transition = "none";
        stopAutoSlide();
        clearTimeout(redirectTimer);
      }

      function onDragMove(event) {
        if (!isDragging) return;

        currentX = getClientX(event);
        const diffX = currentX - startX;
        const movePercent = (diffX / slider.clientWidth) * 100;
        const basePercent = -currentIndex * 100;

        track.style.transform = `translateX(${basePercent + movePercent}%)`;
      }

      function onDragEnd() {
        if (!isDragging) return;

        isDragging = false;
        const diffX = currentX - startX;
        const threshold = slider.clientWidth * 0.18;

        if (diffX > threshold) {
          moveToSlide(currentIndex - 1);
        } else if (diffX < -threshold) {
          moveToSlide(currentIndex + 1);
        } else {
          moveToSlide(currentIndex);
        }

        if (currentIndex < slides.length - 1) {
          startAutoSlide();
        }
      }

      dots.forEach((dot, index) => {
        dot.addEventListener("click", () => {
          moveToSlide(index);

          if (currentIndex < slides.length - 1) {
            startAutoSlide();
          }
        });
      });

      slider.addEventListener("touchstart", onDragStart, { passive: true });
      slider.addEventListener("touchmove", onDragMove, { passive: true });
      slider.addEventListener("touchend", onDragEnd);
      slider.addEventListener("mousedown", onDragStart);
      window.addEventListener("mousemove", onDragMove);
      window.addEventListener("mouseup", onDragEnd);
      window.addEventListener("resize", () => moveToSlide(currentIndex, false));

      moveToSlide(0, false);
      startAutoSlide();
    </script>
  </body>
</html>
