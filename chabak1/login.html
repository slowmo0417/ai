<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>CHABAK Login</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        font-family:
          -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
          "Noto Sans KR", "Segoe UI", sans-serif;
        background: #ffffff;
        color: #566eb5;
        overflow: hidden;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input {
        font-family: inherit;
        border: 0;
        outline: none;
        background: none;
      }

      .app {
        position: relative;
        width: 100%;
        height: 100vh;
        min-height: 640px;
        background: #ffffff;
        overflow: hidden;
      }

      .login-page {
        width: 100%;
        height: 100%;
        padding: 0 24px;
        display: flex;
        flex-direction: column;
      }

      .logo-section {
        flex-shrink: 0;
        padding-top: 131px;
        margin-bottom: 67px;
        display: flex;
        justify-content: center;
      }

      .logo {
        width: 195px;
        height: 106px;
        display: block;
        object-fit: contain;
      }

      .login-form {
        width: 100%;
        flex-shrink: 0;
      }

      .input-group {
        width: 100%;
        margin-bottom: 8px;
        border-bottom: 1px solid #d7d7d7;
      }

      .input-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 16px;
        font-weight: 500;
        color: #566eb5;
      }

      .input-group input {
        display: block;
        width: 100%;
        height: 34px;
        font-size: 16px;
        font-weight: 600;
        color: #333333;
      }

      .field-error {
        display: block;
        min-height: 18px;
        margin-top: 8px;
        margin-bottom: -3px;
        font-size: 13px;
        color: #e34848;
        visibility: hidden;
      }

      .login-btn {
        flex-shrink: 0;
        width: 100%;
        height: 48px;
        min-height: 48px;
        margin-top: 30px;
        border-radius: 9px;
        background: #566eb5;
        color: #ffffff;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
      }

      .login-btn:active {
        transform: scale(0.99);
      }

      .join-btn {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 48px;
        min-height: 48px;
        margin-top: 10px;
        border: 1px solid #566eb5;
        border-radius: 9px;
        color: #566eb5;
        font-size: 16px;
        font-weight: 700;
      }

      .find-menu {
        flex-shrink: 0;
        margin-top: 17px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        color: #566eb5;
        font-size: 14px;
        font-weight: 500;
      }

      .find-menu span {
        width: 1px;
        height: 14px;
        background: #566eb5;
        opacity: 0.8;
      }

      .simple-login {
        flex-shrink: 0;
        margin-top: 35px;
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 14px;
        color: #566eb5;
        font-size: 14px;
        font-weight: 500;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #566eb5;
        opacity: 0.85;
      }

      .social-list {
        margin-top: 28px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 24px;
      }

      .social-btn {
        width: 33px;
        height: 33px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .social-btn img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }

      @media (max-width: 360px) {
        .app {
          min-height: 600px;
        }

        .login-page {
          padding: 0 22px;
        }

        .logo-section {
          padding-top: 84px;
          margin-bottom: 67px;
        }

        .simple-login {
          margin-top: 26px;
        }

        .social-list {
          margin-top: 22px;
        }
      }

      @media (min-width: 480px) {
        .app {
          max-width: 430px;
          margin: 0 auto;
          box-shadow: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="login-page">
        <div class="logo-section">
          <img src="./images/logo +.png" alt="CHABAK" class="logo" />
        </div>

        <form class="login-form" id="loginForm" novalidate>
          <div class="input-group">
            <label for="userId">아이디</label>
            <input type="text" id="userId" autocomplete="username" />
          </div>

          <div class="input-group">
            <label for="userPw">비밀번호</label>
            <input
              type="password"
              id="userPw"
              autocomplete="current-password"
            />
          </div>

          <p class="field-error" id="fieldError">
            아이디와 비밀번호를 확인해주세요.
          </p>

          <button type="submit" class="login-btn">로그인</button>
        </form>

        <a href="#" class="join-btn">회원가입</a>

        <div class="find-menu">
          <a href="#">아이디 찾기</a>
          <span></span>
          <a href="#">비밀번호 찾기</a>
          <span></span>
          <a href="#">둘러보기</a>
        </div>

        <div class="simple-login">
          <div class="divider">간편로그인</div>

          <div class="social-list">
            <a href="#" class="social-btn" aria-label="카카오 로그인">
              <img src="./images/icons/kakao.png" alt="카카오 로그인" />
            </a>
            <a href="#" class="social-btn" aria-label="네이버 로그인">
              <img src="./images/icons/naver.png" alt="네이버 로그인" />
            </a>
            <a href="#" class="social-btn" aria-label="구글 로그인">
              <img src="./images/icons/google.png" alt="구글 로그인" />
            </a>
            <a href="#" class="social-btn" aria-label="페이스북 로그인">
              <img src="./images/icons/facebook.png" alt="페이스북 로그인" />
            </a>
          </div>
        </div>
      </section>
    </main>

    <script>
      const loginForm = document.getElementById("loginForm");
      const userId = document.getElementById("userId");
      const userPw = document.getElementById("userPw");
      const fieldError = document.getElementById("fieldError");

      loginForm.addEventListener("submit", function (event) {
        event.preventDefault();

        const idValue = userId.value.trim();
        const pwValue = userPw.value.trim();

        if (!idValue || !pwValue) {
          fieldError.style.visibility = "visible";

          if (!idValue) {
            userId.focus();
          } else {
            userPw.focus();
          }

          return;
        }

        fieldError.style.visibility = "hidden";
        window.location.href = "./main.html";
      });

      [userId, userPw].forEach(function (input) {
        input.addEventListener("input", function () {
          if (userId.value.trim() && userPw.value.trim()) {
            fieldError.style.visibility = "hidden";
          }
        });
      });
    </script>
  </body>
</html>
