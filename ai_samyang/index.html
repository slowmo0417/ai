<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Community</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <section class="community-section">
      <div class="inner">
        <header class="community-header">
          <h2>COMMUNITY</h2>
          <p>
            삼양식품은 혁신적인 기술과 포용적인 사고로 여러분과 함께<br />
            새로운 식문화를 만들어갑니다.
          </p>

          <div class="sns-list">
            <a href="#" class="sns-item" aria-label="페이스북">
              <img src="./images/ico_facebook.png" alt="페이스북" />
            </a>
            <a href="#" class="sns-item" aria-label="인스타그램">
              <img src="./images/ico_insta.png" alt="인스타그램" />
            </a>
            <a href="#" class="sns-item" aria-label="블로그">
              <img src="./images/ico_blog.png" alt="블로그" />
            </a>
            <a href="#" class="sns-item" aria-label="트위터">
              <img src="./images/ico_twitter.png" alt="트위터" />
            </a>
          </div>
        </header>

        <div class="community-grid">
          <div class="card card-empty"></div>

          <article class="card card-video">
            <div class="card-body">
              <h2>홍보영상</h2>
              <p>
                삼양식품의 다채로운 스토리를<br />
                영상으로 보여드립니다.
              </p>
              <a href="#" class="more-btn">자세히보기</a>
            </div>
          </article>

          <article class="card card-share">
            <div class="card-body">
              <h2>맛있는 나눔</h2>
              <p>모두가 행복한 맛있는 세상</p>
              <a href="#" class="more-btn">자세히보기</a>
            </div>
          </article>

          <article class="card card-notice">
            <div class="card-body">
              <h2>공지사항</h2>
              <p>삼양식품 개인정보취급방침 개정안내</p>
              <a href="#" class="more-btn">자세히보기</a>
            </div>
          </article>

          <article class="card card-contact">
            <div class="card-body">
              <h2>고객 문의</h2>
              <p>
                삼양식품에게<br />
                여러분의 다양한 의견을 남겨주세요.
              </p>
              <a href="#" class="more-btn">자세히보기</a>
            </div>
          </article>

          <article class="card card-mall">
            <div class="card-body">
              <h2>삼양식품 공식몰</h2>
              <p>
                삼양식품의<br />
                다양한 제품을 만나보세요.
              </p>
              <a href="#" class="more-btn">자세히보기</a>
            </div>
          </article>
        </div>
      </div>
    </section>
  </body>
</html>
