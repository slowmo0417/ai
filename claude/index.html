<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1440" />
  <title>Desktop Header Mockup</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      min-width: 1440px;
    }

    .header {
      width: 100%;
      height: 80px;
      background: #ffffff;
      border-bottom: 1px solid #e5e5e5;
    }

    .header-inner {
      position: relative;
      width: 1400px;
      height: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: #111111;
      flex-shrink: 0;
    }

    .logo-mark {
      position: relative;
      width: 28px;
      height: 28px;
    }

    .logo-mark::before,
    .logo-mark::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 28px;
      height: 2px;
      background: #e07349;
      transform-origin: center;
      border-radius: 999px;
    }

    .logo-mark::before {
      transform: translate(-50%, -50%) rotate(0deg);
      box-shadow:
        0 0 0 #e07349,
        0 0 0 #e07349;
    }

    .logo-mark::after {
      transform: translate(-50%, -50%) rotate(45deg);
    }

    .logo-mark span,
    .logo-mark i {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 28px;
      height: 2px;
      background: #e07349;
      transform-origin: center;
      border-radius: 999px;
    }

    .logo-mark span {
      transform: translate(-50%, -50%) rotate(90deg);
    }

    .logo-mark i {
      transform: translate(-50%, -50%) rotate(135deg);
    }

    .logo-text {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 31px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .nav {
      position: absolute;
      left: 50%;
      top: 50%;
      display: flex;
      align-items: center;
      gap: 54px;
      transform: translate(-50%, -50%);
    }

    .nav a {
      position: relative;
      display: inline-flex;
      align-items: center;
      height: 80px;
      text-decoration: none;
      color: #333333;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.2px;
      line-height: 1;
      white-space: nowrap;
      transition: color 0.2s ease;
    }

    .nav a::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 5px;
      background: #de8a63;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .nav a:hover {
      color: #de8a63;
    }

    .nav a:hover::after {
      opacity: 1;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .pill-btn {
      height: 38px;
      padding: 0 18px;
      border-radius: 999px;
      border: none;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.2px;
      cursor: pointer;
    }

    .pill-btn.dark {
      background: #333333;
      color: #ffffff;
    }

    .pill-btn.accent {
      background: #de8a63;
      color: #ffffff;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="#" class="logo">
        <div class="logo-mark">
          <span></span>
          <i></i>
        </div>
        <div class="logo-text">Claude</div>
      </a>

      <nav class="nav">
        <a href="#">ABOUT</a>
        <a href="#">PRODUCTS</a>
        <a href="#">PARTNERSHIP</a>
        <a href="#">EDUCATION</a>
        <a href="#">WHAT’S NEWS</a>
        <a href="#">SUPPORT</a>
      </nav>

      <div class="header-actions">
        <button class="pill-btn dark">매장찾기</button>
        <button class="pill-btn accent">클로드마켓</button>
      </div>
    </div>
  </header>
</body>
</html>
