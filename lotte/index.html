<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOTTERIA Splash</title>
    <link rel="stylesheet" href="./css/index.css" />
  </head>

  <body>
    <main class="splash">
      <div class="logo-wrap">
        <img
          class="logo"
          src="./images/logo/LOTTERIA_BI_wordmark_eng_1.png"
          alt="LOTTERIA"
        />
      </div>

      <div class="loading-area" role="status" aria-label="로딩 진행률">
        <div class="loading-track">
          <div class="loading-fill"></div>
        </div>
        <p class="loading-percent">0%</p>
      </div>
    </main>

    <script src="./script/index.js"></script>
  </body>
</html>
