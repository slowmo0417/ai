<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>롯데리아</title>
    <link rel="stylesheet" href="./css/onboarding.css">
  </head>

  <body>
    <main class="app" id="app">
      <button type="button" class="skip-btn" id="skipBtn">Skip</button>

      <section class="slider" aria-label="온보딩 슬라이드">
        <div class="track" id="track">
          <article class="slide" aria-label="온보딩 첫 번째 화면">
            <figure class="visual-section">
              <img
                class="visual-img"
                src="./images/frame-15.png"
                alt="감자튀김, 버거, 음료 세트"
              >
            </figure>

            <section
              class="content-section"
              aria-labelledby="onboarding-title-1"
            >
              <h2 class="title" id="onboarding-title-1">
                새로워진<br>롯데리아 앱
              </h2>
              <p class="desc">
                더 편리해진 기능과 깔끔한<br>디자인으로 롯데리아를 더욱
                쉽게<br>만나보세요.
              </p>
            </section>
          </article>

          <article class="slide" aria-label="온보딩 두 번째 화면">
            <figure class="visual-section">
              <img
                class="visual-img"
                src="./images/frame-16.png"
                alt="앱으로 버거를 주문하는 모습"
              >
            </figure>

            <section
              class="content-section"
              aria-labelledby="onboarding-title-2"
            >
              <h2 class="title" id="onboarding-title-2">
                앱으로<br>빠르게 주문
              </h2>
              <p class="desc">
                기다릴 필요 없이 앱에서<br>주문하고 바로 픽업하세요.
              </p>
            </section>
          </article>

          <article class="slide" aria-label="온보딩 세 번째 화면">
            <figure class="visual-section">
              <img
                class="visual-img"
                src="./images/frame-17.png"
                alt="할인 쿠폰과 버거, 음료"
              >
            </figure>

            <section
              class="content-section"
              aria-labelledby="onboarding-title-3"
            >
              <h2 class="title" id="onboarding-title-3">
                다양한<br>할인 쿠폰
              </h2>
              <p class="desc">
                앱 전용 쿠폰과 이벤트로<br>더 합리적인 가격에 즐겨보세요.
              </p>
            </section>
          </article>
        </div>
      </section>

      <nav class="bottom-ui" id="bottomUi" aria-label="온보딩 탐색">
        <ol class="pagination" aria-label="슬라이드 페이지">
          <li class="dot active" aria-current="true"></li>
          <li class="dot"></li>
          <li class="dot"></li>
        </ol>

        <button type="button" class="next-btn" id="nextBtn">다음</button>
        <button type="button" class="start-btn" id="startBtn">시작하기</button>
      </nav>
    </main>

    <script src="./script/onboarding.js"></script>
  </body>
</html>
