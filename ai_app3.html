<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그렇게 사랑합니다</title>
    <style>
        /* 배경색 및 기본 폰트 설정 */
        body {
            background-color: #9ce69c; /* 시안과 유사한 연두색 배경 */
            font-family: 'Gulim', '굴림', 'Malgun Gothic', '맑은 고딕', sans-serif;
            color: #000;
            margin: 0;
            padding: 50px 0; /* 좌우 여백을 0으로 변경하고 상하 50px만 유지 */
            line-height: 1.6;
        }

        /* 전체 콘텐츠를 감싸는 컨테이너 */
        .container {
            width: 100%; /* 브라우저 100% 너비 사용 (최대 너비 제한 해제) */
        }

        /* 상단 제목과 작가 이름 영역 */
        .header {
            position: relative;
            height: 80px;
            margin-bottom: 50px;
        }

        /* 왼쪽 상단 제목 */
        .title {
            position: absolute;
            top: 0;
            left: 0;
            font-size: 20px;
            font-weight: bold; /* 볼드체 적용 */
        }

        /* 오른쪽 상단 작가 이름 (제목보다 살짝 아래 배치) */
        .author {
            position: absolute;
            top: 50px;
            right: 0;
            font-size: 16px;
        }

        /* 각 문단 공통 여백 */
        .stanza {
            margin-bottom: 70px;
            font-size: 16px;
        }

        /* 첫 번째 문단 (좌측 정렬) */
        .stanza-1 {
            text-align: left;
        }

        /* 두 번째 문단 (가운데 정렬) */
        .stanza-2 {
            text-align: center;
        }

        /* 세 번째 문단 (우측 정렬) */
        .stanza-3 {
            text-align: right;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 상단 헤더 영역 -->
        <div class="header">
            <div class="title">그렇게 사랑합니다.</div>
            <div class="author">-한용운-</div>
        </div>

        <!-- 1연 -->
        <div class="stanza stanza-1">
            사랑한다는 사람앞에서는<br>
            사랑 한다는말을 안합니다.<br>
            안하는것이아니라<br>
            못하는것이 사랑의 진실입니다.
        </div>

        <!-- 2연 -->
        <div class="stanza stanza-2">
            잊어버려야 하겠다는 말은<br>
            잊을수 없다는말입니다.<br>
            정말 잊고싶을 때는 말이 없습니다.
        </div>

        <!-- 3연 -->
        <div class="stanza stanza-3">
            헤어질때 돌아보지 않는것은<br>
            너무 헤어지기 싫기때문입니다.<br>
            그것은 헤어지는것이 아니라<br>
            같이 있다는 말입니다.
        </div>
    </div>

</body>
</html>
