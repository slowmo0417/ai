<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>부산 맛집 서비스</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR",
          sans-serif;
        background: #fff;
        color: #333;
      }

      button,
      input,
      textarea {
        font-family: inherit;
      }

      button {
        border: 0;
        background: none;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }

      .app {
        width: 100%;
        max-width: 440px;
        min-height: 100vh;
        margin: 0 auto;
        background: #fff;
        overflow-x: hidden;
      }

      .page {
        display: none;
        min-height: 100vh;
        padding-bottom: 88px;
      }

      .page.active {
        display: block;
        animation: pageFade 0.32s ease both;
      }

      .header {
        position: sticky;
        top: 0;
        z-index: 20;
        background: rgba(255, 255, 255, 0.94);
        padding: 16px 16px 14px;
        border-bottom: 1px solid #f2f2f2;
        backdrop-filter: blur(14px);
      }

      .title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 6px;
      }

      .title-row h1 {
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -0.8px;
        color: #333;
      }

      .header-icons {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .icon-btn {
        width: 28px;
        height: 28px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #111;
        border-radius: 50%;
        transition:
          transform 0.2s ease,
          background 0.2s ease;
      }

      .icon-btn:active {
        transform: scale(0.88) rotate(-8deg);
        background: #f3f3f3;
      }

      .icon-btn svg {
        width: 24px;
        height: 24px;
        stroke-width: 2.2;
      }

      .total-count {
        font-size: 14px;
        color: #888;
        font-weight: 500;
        margin-bottom: 12px;
        transition: color 0.2s ease;
      }

      .search-box {
        position: relative;
        transition: transform 0.24s ease;
      }

      .search-box:focus-within {
        transform: translateY(-2px);
      }

      .search-box svg {
        position: absolute;
        left: 17px;
        top: 50%;
        transform: translateY(-50%);
        width: 22px;
        height: 22px;
        color: #333;
        transition: transform 0.25s ease;
      }

      .search-box:focus-within svg {
        transform: translateY(-50%) scale(1.08);
      }

      .search-box input {
        width: 100%;
        height: 48px;
        border: 1px solid #f0f0f0;
        border-radius: 24px;
        padding: 0 48px 0 56px;
        font-size: 15px;
        font-weight: 600;
        outline: none;
        color: #333;
        background: #fff;
        transition:
          border-color 0.22s ease,
          box-shadow 0.22s ease;
      }

      .search-box input:focus {
        border-color: #333;
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.07);
      }

      .search-box input::placeholder {
        color: #e2e2e2;
      }

      .clear-search-btn {
        position: absolute;
        right: 14px;
        top: 50%;
        width: 26px;
        height: 26px;
        transform: translateY(-50%);
        border-radius: 50%;
        background: #f1f1f1;
        color: #777;
        font-size: 18px;
        font-weight: 800;
        line-height: 1;
        display: none;
        align-items: center;
        justify-content: center;
        transition:
          transform 0.18s ease,
          background 0.18s ease;
      }

      .clear-search-btn.show {
        display: inline-flex;
      }

      .clear-search-btn:active {
        transform: translateY(-50%) scale(0.9);
        background: #e4e4e4;
      }

      .quick-keywords {
        display: flex;
        gap: 8px;
        padding: 12px 16px 0;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .quick-keywords::-webkit-scrollbar {
        display: none;
      }

      .keyword-chip {
        flex: 0 0 auto;
        height: 34px;
        padding: 0 14px;
        border: 1px solid #eee;
        border-radius: 17px;
        background: #fff;
        color: #555;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: -0.4px;
        transition:
          transform 0.18s ease,
          background 0.18s ease,
          color 0.18s ease,
          border-color 0.18s ease;
      }

      .keyword-chip:active,
      .keyword-chip.active {
        transform: scale(0.96);
        background: #333;
        color: #fff;
        border-color: #333;
      }

      .list {
        padding: 16px 16px 0;
      }

      .food-card {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        min-height: 134px;
        padding: 20px 15px;
        margin-bottom: 10px;
        border: 1px solid #f1f1f1;
        border-radius: 18px;
        background: #fff;
        opacity: 0;
        transform: translateY(16px);
        animation: cardUp 0.42s ease forwards;
        transition:
          transform 0.22s ease,
          box-shadow 0.22s ease,
          border-color 0.22s ease;
      }

      .food-card:active {
        transform: scale(0.985);
        border-color: #ddd;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.06);
      }

      .food-card:nth-child(1) {
        animation-delay: 0.02s;
      }
      .food-card:nth-child(2) {
        animation-delay: 0.05s;
      }
      .food-card:nth-child(3) {
        animation-delay: 0.08s;
      }
      .food-card:nth-child(4) {
        animation-delay: 0.11s;
      }
      .food-card:nth-child(5) {
        animation-delay: 0.14s;
      }
      .food-card:nth-child(n + 6) {
        animation-delay: 0.16s;
      }

      .food-info {
        min-width: 0;
        flex: 1;
      }

      .food-name {
        margin-bottom: 14px;
        font-size: 20px;
        line-height: 1.15;
        font-weight: 800;
        letter-spacing: -0.8px;
        color: #333;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .food-meta {
        display: flex;
        gap: 4px;
        margin-bottom: 7px;
        font-size: 14px;
        line-height: 1.25;
        letter-spacing: -0.5px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .food-meta strong {
        color: #222;
        font-weight: 800;
        flex: 0 0 auto;
      }

      .food-meta span {
        min-width: 0;
        color: #999;
        font-weight: 700;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .card-actions {
        display: flex;
        align-items: center;
        gap: 14px;
        flex: 0 0 auto;
      }

      .small-action {
        width: 32px;
        height: 32px;
        border: 1px solid #eee;
        border-radius: 4px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        transition:
          transform 0.2s ease,
          background 0.2s ease;
      }

      .small-action:active {
        transform: scale(0.85);
        background: #f7f7f7;
      }

      .small-action svg {
        width: 22px;
        height: 22px;
        stroke: #000;
        stroke-width: 2.2;
      }

      .small-action.liked {
        animation: heartPop 0.34s ease;
      }

      .small-action.liked svg {
        fill: #111;
      }

      .bottom-tabs {
        position: fixed;
        left: 50%;
        bottom: 0;
        z-index: 40;
        width: 100%;
        max-width: 440px;
        transform: translateX(-50%);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 28px;
        padding: 0 16px 12px;
        background: linear-gradient(to top, #fff 72%, rgba(255, 255, 255, 0));
        transition:
          opacity 0.24s ease,
          transform 0.24s ease;
      }

      .bottom-tabs.detail-mode {
        opacity: 0;
        pointer-events: none;
        transform: translateX(-50%) translateY(18px);
      }

      .bottom-tabs.detail-mode.show-on-bottom {
        opacity: 1;
        pointer-events: auto;
        transform: translateX(-50%) translateY(0);
      }

      .tab-btn {
        height: 44px;
        border: 1px solid #eee;
        border-radius: 5px;
        background: #fff;
        color: #333;
        font-size: 15px;
        font-weight: 800;
        box-shadow: 0 -2px 16px rgba(255, 255, 255, 0.8);
        transition:
          transform 0.2s ease,
          background 0.2s ease,
          color 0.2s ease;
      }

      .tab-btn:active {
        transform: scale(0.97);
      }

      .tab-btn.active {
        border-color: #333;
        background: #333;
        color: #fff;
        animation: tabPop 0.24s ease;
      }

      .pagination-wrap {
        padding: 8px 16px 18px;
      }

      .pagination {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .page-btn {
        min-width: 38px;
        height: 38px;
        padding: 0 10px;
        border: 1px solid #eee;
        border-radius: 10px;
        background: #fff;
        color: #333;
        font-size: 14px;
        font-weight: 800;
        transition:
          transform 0.2s ease,
          background 0.2s ease,
          color 0.2s ease,
          border-color 0.2s ease;
      }

      .page-btn:active {
        transform: scale(0.94);
      }

      .page-btn.active {
        border-color: #333;
        background: #333;
        color: #fff;
      }

      .page-btn:disabled {
        opacity: 0.35;
        cursor: default;
      }

      .page-info {
        margin-top: 8px;
        color: #999;
        font-size: 13px;
        font-weight: 700;
        text-align: center;
      }

      .loading,
      .empty,
      .error {
        padding: 50px 16px;
        text-align: center;
        color: #888;
        font-weight: 700;
        line-height: 1.5;
      }

      .loading::before {
        content: "";
        display: block;
        width: 28px;
        height: 28px;
        margin: 0 auto 14px;
        border: 3px solid #eee;
        border-top-color: #333;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      .detail-hero {
        width: calc(100% - 32px);
        height: 230px;
        margin: 16px 16px 17px;
        border-radius: 16px;
        overflow: hidden;
        background: #f5f5f5;
        animation: heroZoom 0.48s ease both;
      }

      .detail-hero img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }

      .detail-tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 28px;
        padding: 0 16px 18px;
      }

      .detail-tab-btn {
        height: 44px;
        border: 1px solid #eee;
        border-radius: 5px;
        background: #fff;
        color: #333;
        font-size: 16px;
        font-weight: 800;
        letter-spacing: -0.5px;
        transition:
          transform 0.2s ease,
          background 0.2s ease,
          color 0.2s ease;
      }

      .detail-tab-btn:active {
        transform: scale(0.97);
      }

      .detail-tab-btn.active {
        border-color: #333;
        background: #333;
        color: #fff;
      }

      .detail-panel {
        display: none;
      }

      .detail-panel.active {
        display: block;
        animation: pageFade 0.28s ease both;
      }

      .detail-content {
        padding: 0 16px 24px;
      }

      .detail-content > .label,
      .detail-content > .detail-text {
        animation: detailUp 0.38s ease both;
      }

      .detail-content > .label:nth-of-type(1) {
        animation-delay: 0.03s;
      }
      .detail-content > .detail-text:nth-of-type(1) {
        animation-delay: 0.06s;
      }
      .detail-content > .label:nth-of-type(2) {
        animation-delay: 0.09s;
      }
      .detail-content > .detail-text:nth-of-type(2) {
        animation-delay: 0.12s;
      }
      .detail-content > .label:nth-of-type(3) {
        animation-delay: 0.15s;
      }
      .detail-content > .detail-text:nth-of-type(3) {
        animation-delay: 0.18s;
      }

      .label {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        margin-bottom: 10px;
        padding: 8px 12px;
        border-radius: 5px;
        background: #333;
        color: #fff;
        font-size: 16px;
        font-weight: 800;
        letter-spacing: -0.5px;
      }

      .detail-text {
        margin-bottom: 13px;
        color: #444;
        font-size: 16px;
        line-height: 1.45;
        letter-spacing: -0.4px;
        word-break: keep-all;
      }

      .detail-text.menu {
        white-space: pre-line;
      }

      .map {
        width: calc(100% - 32px);
        height: 190px;
        margin: 0 16px 10px;
        background: #f1f1f1;
        animation: detailUp 0.42s ease 0.2s both;
      }

      .direction-wrap {
        width: calc(100% - 32px);
        margin: 0 16px 30px;
        display: flex;
        justify-content: flex-end;
        animation: detailUp 0.42s ease 0.24s both;
      }

      .direction-btn {
        min-width: 92px;
        height: 36px;
        padding: 0 13px;
        border: 1px solid #eee;
        border-radius: 18px;
        background: #333;
        color: #fff;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: -0.4px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        transition:
          transform 0.18s ease,
          background 0.18s ease;
      }

      .direction-btn:active {
        transform: scale(0.96);
        background: #111;
      }

      .review-list {
        padding: 0 16px 18px;
      }

      .review-bottom-action {
        padding: 0 16px 96px;
      }

      .review-write-bottom-btn {
        width: 100%;
        height: 48px;
        border: 1px solid #333;
        border-radius: 8px;
        background: #333;
        color: #fff;
        font-size: 16px;
        font-weight: 900;
        letter-spacing: -0.5px;
        transition:
          transform 0.18s ease,
          background 0.18s ease;
      }

      .review-write-bottom-btn:active {
        transform: scale(0.98);
        background: #111;
      }

      .review-card {
        padding: 14px 0 17px;
        border-bottom: 1px solid #222;
        animation: detailUp 0.34s ease both;
      }

      .review-head {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 24px;
        color: #111;
        font-size: 20px;
        font-weight: 900;
        letter-spacing: -0.5px;
      }

      .review-stars {
        color: #000;
        font-size: 18px;
        letter-spacing: 2px;
        white-space: nowrap;
      }

      .review-text {
        color: #111;
        font-size: 16px;
        font-weight: 500;
        line-height: 1.45;
        letter-spacing: -0.5px;
        word-break: keep-all;
      }

      .review-write-fab {
        position: fixed;
        right: max(16px, calc(50% - 204px));
        bottom: 86px;
        z-index: 70;
        width: 48px;
        height: 48px;
        border: 1px solid #eee;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        display: none;
        align-items: center;
        justify-content: center;
      }

      .review-write-fab.show {
        display: inline-flex;
        animation: fabIn 0.24s ease both;
      }

      .review-write-fab svg {
        width: 24px;
        height: 24px;
        stroke-width: 2.4;
      }

      .write-page {
        padding: 16px;
      }

      .write-title {
        margin: 54px 0 8px;
        color: #222;
        font-size: 26px;
        font-weight: 900;
        letter-spacing: -0.8px;
      }

      .write-subtitle {
        margin-bottom: 28px;
        color: #888;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: -0.4px;
      }

      .write-field {
        margin-bottom: 18px;
      }

      .fixed-user-name {
        min-height: 48px;
        border: 1px solid #eee;
        border-radius: 14px;
        padding: 14px;
        color: #222;
        background: #fafafa;
        font-size: 16px;
        font-weight: 800;
      }

      .write-label {
        display: block;
        margin-bottom: 10px;
        color: #333;
        font-size: 16px;
        font-weight: 900;
      }

      .write-input,
      .write-textarea {
        font-family: inherit;
        width: 100%;
        border: 1px solid #eee;
        border-radius: 14px;
        padding: 14px;
        color: #222;
        font-size: 16px;
        font-weight: 700;
        outline: none;
        resize: none;
        transition:
          border-color 0.22s ease,
          box-shadow 0.22s ease;
      }

      .write-input:focus,
      .write-textarea:focus {
        border-color: #333;
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.07);
      }

      .write-textarea {
        min-height: 150px;
        line-height: 1.5;
      }

      .rating-select {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 10px 12px;
        border: 1px solid #eee;
        border-radius: 14px;
        background: #fff;
      }

      .rating-star {
        width: 34px;
        height: 34px;
        color: #d7d7d7;
        font-size: 30px;
        line-height: 1;
        font-weight: 900;
        transition:
          transform 0.16s ease,
          color 0.16s ease;
      }

      .rating-star.active {
        color: #111;
      }

      .rating-star:active {
        transform: scale(0.86);
      }

      .rating-guide {
        margin-top: 8px;
        color: #999;
        font-size: 13px;
        font-weight: 700;
      }

      .write-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 26px;
      }

      .write-action-btn {
        height: 48px;
        border: 1px solid #eee;
        border-radius: 8px;
        background: #fff;
        color: #333;
        font-size: 16px;
        font-weight: 900;
      }

      .write-action-btn.primary {
        border-color: #333;
        background: #333;
        color: #fff;
      }

      .back-btn {
        position: fixed;
        left: 50%;
        top: 12px;
        z-index: 60;
        transform: translateX(calc(-50% - 178px));
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        display: none;
        align-items: center;
        justify-content: center;
      }

      .back-btn.show {
        display: inline-flex;
        animation: backIn 0.24s ease both;
      }

      .back-btn svg {
        width: 24px;
        height: 24px;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 72px;
        z-index: 80;
        transform: translate(-50%, 16px);
        min-width: 160px;
        max-width: calc(100% - 48px);
        padding: 12px 16px;
        border-radius: 22px;
        background: rgba(51, 51, 51, 0.94);
        color: #fff;
        font-size: 14px;
        font-weight: 800;
        text-align: center;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.22s ease,
          transform 0.22s ease;
      }

      .toast.show {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      @keyframes pageFade {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes cardUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes detailUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes heroZoom {
        from {
          opacity: 0;
          transform: scale(0.96);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes heartPop {
        0% {
          transform: scale(1);
        }
        45% {
          transform: scale(1.24);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes tabPop {
        0% {
          transform: scale(0.96);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes backIn {
        from {
          opacity: 0;
          transform: translateX(calc(-50% - 178px)) scale(0.8);
        }
        to {
          opacity: 1;
          transform: translateX(calc(-50% - 178px)) scale(1);
        }
      }

      @keyframes fabIn {
        from {
          opacity: 0;
          transform: translateY(12px) scale(0.86);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 420px) {
        .food-name {
          font-size: 20px;
        }

        .card-actions {
          gap: 12px;
        }

        .bottom-tabs {
          gap: 28px;
        }

        .back-btn {
          left: 16px;
          transform: none;
        }

        .review-write-fab {
          right: 16px;
          bottom: 86px;
        }

        @keyframes backIn {
          from {
            opacity: 0;
            transform: scale(0.8);
          }
          to {
            opacity: 1;
            transform: scale(1);
          }
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <button
        class="back-btn"
        id="backBtn"
        type="button"
        aria-label="목록으로 돌아가기"
      >
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-linecap="round"

    <!-- 카카오맵 JavaScript 키를 넣어주세요 -->
    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=cc8c124f8a594a01e630a3c43ae4349a&libraries=services"></script>

    <script>
      const API_KEY =
        "70af5d490850a84f63481ed1a416d825de2954376f0f71d628fd03361250da81";
      const API_URL = "https://apis.data.go.kr/6260000/FoodService/getFoodKr";

      const FALLBACK_IMAGE =
        "https://images.unsplash.com/photo-1582878826629-29b7ad1cdc43?auto=format&fit=crop&w=900&q=80";

      const state = {
        foods: [],
        filteredFoods: [],
        likedIds: JSON.parse(localStorage.getItem("busanLikedFoods") || "[]"),
        mode: "all",
        keyword: "",
        map: null,
        marker: null,
        toastTimer: null,
        pageSize: 10,
        currentPage: 1,
        currentFoodId: null,
        detailTab: "info",
        reviewRating: 5,
        reviews: JSON.parse(localStorage.getItem("busanFoodReviews") || "{}"),
        currentRouteFood: null,
      };

      const foodList = document.getElementById("foodList");
      const totalCount = document.getElementById("totalCount");
      const searchForm = document.getElementById("searchForm");
      const searchInput = document.getElementById("searchInput");
      const clearSearchBtn = document.getElementById("clearSearchBtn");
      const refreshBtn = document.getElementById("refreshBtn");
      const topLikeBtn = document.getElementById("topLikeBtn");
      const allTab = document.getElementById("allTab");
      const likeTab = document.getElementById("likeTab");
      const listPage = document.getElementById("listPage");
      const detailPage = document.getElementById("detailPage");
      const reviewWritePage = document.getElementById("reviewWritePage");
      const backBtn = document.getElementById("backBtn");
      const bottomTabs = document.getElementById("bottomTabs");
      const toast = document.getElementById("toast");
      const quickKeywords = document.getElementById("quickKeywords");
      const paginationWrap = document.getElementById("paginationWrap");
      const pagination = document.getElementById("pagination");
      const pageInfo = document.getElementById("pageInfo");
      const infoDetailTab = document.getElementById("infoDetailTab");
      const reviewDetailTab = document.getElementById("reviewDetailTab");
      const infoPanel = document.getElementById("infoPanel");
      const reviewPanel = document.getElementById("reviewPanel");
      const reviewList = document.getElementById("reviewList");
      const reviewWriteFab = document.getElementById("reviewWriteFab");
      const reviewWriteBottomBtn = document.getElementById(
        "reviewWriteBottomBtn",
      );
      const reviewForm = document.getElementById("reviewForm");
      const reviewTextInput = document.getElementById("reviewTextInput");
      const ratingSelect = document.getElementById("ratingSelect");
      const cancelReviewBtn = document.getElementById("cancelReviewBtn");
      const writeFoodName = document.getElementById("writeFoodName");
      const ratingGuide = document.getElementById("ratingGuide");
      const directionBtn = document.getElementById("directionBtn");

      const defaultReviewTexts = [
        "가게가 깔끔하고 음식이 맛있어요",
        "국물이 깊고 든든해서 다시 방문하고 싶어요",
        "직원분들이 친절하고 회전율도 괜찮았어요",
        "부산 여행 중 들르기 좋은 맛집이에요",
        "대표 메뉴가 확실히 인상적이었어요",
        "웨이팅은 있었지만 기다릴 만한 맛이었습니다",
      ];

      const icons = {
        search: `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
      `,
        heart: `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"></path>
        </svg>
      `,
      };

      function getValue(item, keys, fallback = "") {
        for (const key of keys) {
          if (
            item[key] !== undefined &&
            item[key] !== null &&
            String(item[key]).trim() !== ""
          ) {
            return String(item[key]).trim();
          }
        }
        return fallback;
      }

      function normalizeFood(item, index) {
        const name = getValue(
          item,
          ["MAIN_TITLE", "UC_SEQ", "TITLE", "NAME", "RSTR_NM"],
          "상호명 정보 없음",
        );
        const address = getValue(
          item,
          ["ADDR1", "ADDR", "GUGUN_NM", "ROAD_ADDRESS"],
          "주소 정보 없음",
        );
        const menu = getValue(
          item,
          ["RPRSNTV_MENU", "ITEMCNTNTS", "MENU", "MAIN_MENU"],
          "대표 메뉴 정보 없음",
        );
        const intro = getValue(
          item,
          ["ITEMCNTNTS", "CNTCT_TEL", "INTRO", "SUBTITLE"],
          "소개 정보가 없습니다.",
        );
        const image = getValue(
          item,
          ["MAIN_IMG_NORMAL", "MAIN_IMG_THUMB", "IMG_URL", "IMAGE"],
          FALLBACK_IMAGE,
        );
        const tel = getValue(
          item,
          ["CNTCT_TEL", "TEL", "PHONE"],
          "전화번호 정보 없음",
        );
        const time = getValue(
          item,
          ["USAGE_DAY_WEEK_AND_TIME", "HOMEPAGE_URL", "OPEN_TIME", "TIME"],
          "운영시간 정보 없음",
        );
        const lat = Number(getValue(item, ["LAT", "LATITUDE", "Y"]));
        const lng = Number(getValue(item, ["LNG", "LONGITUDE", "X"]));
        const id = getValue(
          item,
          ["UC_SEQ", "ID"],
          `${name}-${address}-${index}`,
        );

        return {
          id,
          name,
          address,
          menu,
          intro,
          image,
          tel,
          time,
          lat,
          lng,
        };
      }

      async function loadFoods() {
        foodList.innerHTML = `<div class="loading">맛집 정보를 불러오는 중입니다.</div>`;
        showToast("맛집 정보를 불러오는 중");

        const params = new URLSearchParams({
          serviceKey: API_KEY,
          pageNo: "1",
          numOfRows: "200",
          resultType: "json",
        });

        try {
          const response = await fetch(`${API_URL}?${params.toString()}`);

          if (!response.ok) {
            throw new Error("공공데이터 API 요청에 실패했습니다.");
          }

          const data = await response.json();
          const rawItems = findItems(data);

          state.foods = rawItems.map(normalizeFood);
          applyFilter();
          showToast("맛집 정보를 불러왔습니다");
        } catch (error) {
          console.error(error);
          foodList.innerHTML = `
          <div class="error">
            데이터를 불러오지 못했습니다.<br />
            API 주소, 서비스키, CORS 허용 여부를 확인해주세요.
          </div>
        `;
          paginationWrap.style.display = "none";
          totalCount.textContent = "전체 0건";
          showToast("데이터를 불러오지 못했습니다");
        }
      }

      function findItems(data) {
        if (Array.isArray(data)) return data;
        if (Array.isArray(data?.getFoodKr?.item)) return data.getFoodKr.item;
        if (Array.isArray(data?.getFoodKr?.items?.item))
          return data.getFoodKr.items.item;
        if (Array.isArray(data?.response?.body?.items?.item))
          return data.response.body.items.item;
        if (Array.isArray(data?.body?.items?.item)) return data.body.items.item;

        const stack = [data];
        while (stack.length) {
          const current = stack.pop();
          if (!current || typeof current !== "object") continue;
          for (const value of Object.values(current)) {
            if (
              Array.isArray(value) &&
              value.length &&
              typeof value[0] === "object"
            ) {
              return value;
            }
            if (value && typeof value === "object") stack.push(value);
          }
        }
        return [];
      }

      function applyFilter() {
        const keyword = state.keyword.toLowerCase().trim();
        let list = [...state.foods];

        if (state.mode === "liked") {
          list = list.filter((food) => state.likedIds.includes(food.id));
        }

        if (keyword) {
          list = list.filter((food) => {
            return [food.name, food.address, food.menu, food.intro].some(
              (text) => text.toLowerCase().includes(keyword),
            );
          });
        }

        state.filteredFoods = list;
        state.currentPage = 1;
        renderList();
        updateKeywordChips();
        updateClearSearchButton();
      }

      function renderList() {
        totalCount.textContent = `${state.mode === "liked" ? "즐겨찾기" : "전체"} ${state.filteredFoods.length}건`;

        if (state.filteredFoods.length === 0) {
          foodList.innerHTML = `<div class="empty">표시할 맛집이 없습니다.</div>`;
          paginationWrap.style.display = "none";
          return;
        }

        const totalPages = Math.ceil(
          state.filteredFoods.length / state.pageSize,
        );
        const safePage = Math.min(Math.max(state.currentPage, 1), totalPages);
        state.currentPage = safePage;

        const startIndex = (safePage - 1) * state.pageSize;
        const endIndex = startIndex + state.pageSize;
        const visibleFoods = state.filteredFoods.slice(startIndex, endIndex);

        foodList.innerHTML = visibleFoods
          .map((food) => {
            const liked = state.likedIds.includes(food.id);
            return `
            <article class="food-card" data-id="${escapeHtml(food.id)}">
              <div class="food-info">
                <h2 class="food-name">${escapeHtml(food.name)}</h2>
                <p class="food-meta"><strong>주소 :</strong><span>${escapeHtml(food.address)}</span></p>
                <p class="food-meta"><strong>메뉴 :</strong><span>${escapeHtml(food.menu)}</span></p>
              </div>
              <div class="card-actions">
                <button class="small-action detail-btn" type="button" aria-label="상세보기">${icons.search}</button>
                <button class="small-action like-btn ${liked ? "liked" : ""}" type="button" aria-label="즐겨찾기">${icons.heart}</button>
              </div>
            </article>
          `;
          })
          .join("");

        renderPagination(totalPages);
        paginationWrap.style.display = totalPages > 1 ? "block" : "none";
        pageInfo.textContent = `${safePage} / ${totalPages} 페이지 · 총 ${state.filteredFoods.length}개`;
      }

      function openDetail(foodId) {
        const food = state.foods.find((item) => item.id === foodId);
        if (!food) return;

        state.currentFoodId = foodId;
        state.currentRouteFood = food;
        setDetailTab("info");

        document.getElementById("detailImage").src =
          food.image || FALLBACK_IMAGE;
        document.getElementById("detailName").textContent = food.name;
        document.getElementById("detailAddress").textContent = food.address;
        document.getElementById("detailIntro").textContent = food.intro;
        document.getElementById("detailMenu").textContent = food.menu;
        document.getElementById("detailTel").textContent = food.tel;
        document.getElementById("detailTime").textContent = food.time;

        listPage.classList.remove("active");
        detailPage.classList.add("active");
        reviewWritePage.classList.remove("active");
        backBtn.classList.add("show");
        bottomTabs.style.display = "grid";
        backBtn.classList.add("show");
        bottomTabs.classList.add("detail-mode");
        bottomTabs.classList.remove("show-on-bottom");
        reviewWriteFab.classList.remove("show");
        window.scrollTo({ top: 0, behavior: "auto" });

        setTimeout(() => renderMap(food), 100);
        setTimeout(updateDetailTabsVisibility, 120);
      }

      function setDetailTab(tab) {
        state.detailTab = tab;
        const isInfo = tab === "info";

        infoDetailTab.classList.toggle("active", isInfo);
        reviewDetailTab.classList.toggle("active", !isInfo);
        infoPanel.classList.toggle("active", isInfo);
        reviewPanel.classList.toggle("active", !isInfo);
        reviewWriteFab.classList.toggle(
          "show",
          !isInfo &&
            detailPage.classList.contains("active") &&
            !reviewWritePage.classList.contains("active"),
        );

        if (!isInfo) {
          renderReviews();
        }
      }

      function getReviews(foodId) {
        if (!state.reviews[foodId]) {
          state.reviews[foodId] = makeDefaultReviews(foodId);
          saveReviews();
        }
        return state.reviews[foodId];
      }

      function makeDefaultReviews(foodId) {
        return defaultReviewTexts.map((text, index) => ({
          id: `${foodId}-default-${index}`,
          name: index % 2 === 0 ? "dsa******" : "busan***",
          rating: index === 1 ? 4 : 5,
          text,
        }));
      }

      function renderReviews() {
        if (!state.currentFoodId) return;
        const reviews = getReviews(state.currentFoodId);

        reviewList.innerHTML = reviews
          .map(
            (review) => `
          <article class="review-card">
            <div class="review-head">
              <span>${escapeHtml(review.name)}</span>
              <span class="review-stars">${"★".repeat(review.rating)}</span>
            </div>
            <p class="review-text">${escapeHtml(review.text)}</p>
          </article>
        `,
          )
          .join("");
      }

      function openReviewWritePage() {
        const food = state.foods.find(
          (item) => item.id === state.currentFoodId,
        );
        if (!food) return;

        detailPage.classList.remove("active");
        reviewWritePage.classList.add("active");
        bottomTabs.classList.add("detail-mode");
        bottomTabs.classList.remove("show-on-bottom");
        reviewWriteFab.classList.remove("show");
        writeFoodName.textContent = `${food.name} 리뷰를 작성해주세요.`;
        reviewTextInput.value = "";
        setRating(5);
        window.scrollTo({ top: 0, behavior: "auto" });
      }

      function closeReviewWritePage() {
        reviewWritePage.classList.remove("active");
        detailPage.classList.add("active");
        backBtn.classList.add("show");
        bottomTabs.style.display = "grid";
        bottomTabs.classList.add("detail-mode");
        bottomTabs.classList.remove("show-on-bottom");
        setDetailTab("review");
        window.scrollTo({ top: 0, behavior: "auto" });
      }

      function setRating(rating) {
        state.reviewRating = rating;
        document.querySelectorAll(".rating-star").forEach((button) => {
          button.classList.toggle(
            "active",
            Number(button.dataset.rating) <= rating,
          );
        });
        ratingGuide.textContent = `${rating}점 선택됨`;
      }

      function saveReview(event) {
        event.preventDefault();
        if (!state.currentFoodId) return;

        const text = reviewTextInput.value.trim();
        const name = "use****";

        if (!text) {
          showToast("리뷰 내용을 입력해주세요");
          return;
        }

        const newReview = {
          id: `${state.currentFoodId}-${Date.now()}`,
          name,
          rating: state.reviewRating,
          text,
        };

        const reviews = getReviews(state.currentFoodId);
        state.reviews[state.currentFoodId] = [newReview, ...reviews];
        saveReviews();
        closeReviewWritePage();
        showToast("리뷰가 등록되었습니다");
      }

      function saveReviews() {
        localStorage.setItem("busanFoodReviews", JSON.stringify(state.reviews));
      }

      function closeDetail() {
        if (reviewWritePage.classList.contains("active")) {
          closeReviewWritePage();
          return;
        }

        detailPage.classList.remove("active");
        reviewWritePage.classList.remove("active");
        listPage.classList.add("active");
        state.currentFoodId = null;
        state.detailTab = "info";
        backBtn.classList.remove("show");
        reviewWriteFab.classList.remove("show");
        bottomTabs.style.display = "grid";
        bottomTabs.classList.remove("detail-mode", "show-on-bottom");
        window.scrollTo({ top: 0, behavior: "auto" });
      }

      function renderMap(food) {
        const mapBox = document.getElementById("map");

        if (!window.kakao || !window.kakao.maps) {
          mapBox.innerHTML = `<div class="empty">카카오맵 키를 확인해주세요.</div>`;
          return;
        }

        mapBox.innerHTML = "";

        const kakaoMaps = window.kakao.maps;
        const defaultLat = 35.1796;
        const defaultLng = 129.0756;
        const lat = Number.isFinite(food.lat) ? food.lat : defaultLat;
        const lng = Number.isFinite(food.lng) ? food.lng : defaultLng;
        const position = new kakaoMaps.LatLng(lat, lng);

        state.map = new kakaoMaps.Map(mapBox, {
          center: position,
          level: 4,
        });

        state.marker = new kakaoMaps.Marker({
          position,
          map: state.map,
        });

        if (!Number.isFinite(food.lat) || !Number.isFinite(food.lng)) {
          if (!kakaoMaps.services || !kakaoMaps.services.Geocoder) return;

          const geocoder = new kakaoMaps.services.Geocoder();
          geocoder.addressSearch(food.address, (result, status) => {
            if (status !== kakaoMaps.services.Status.OK || !result[0]) return;
            const searchedLat = Number(result[0].y);
            const searchedLng = Number(result[0].x);
            const searchedPosition = new kakaoMaps.LatLng(
              searchedLat,
              searchedLng,
            );
            state.currentRouteFood = {
              ...food,
              lat: searchedLat,
              lng: searchedLng,
            };
            state.map.setCenter(searchedPosition);
            state.marker.setPosition(searchedPosition);
          });
        }
      }

      function openDirection() {
        const food = state.currentRouteFood;
        if (!food) return;

        const destinationName = encodeURIComponent(food.name);
        const destinationAddress = encodeURIComponent(food.address);
        const hasCoords =
          Number.isFinite(food.lat) && Number.isFinite(food.lng);

        const openKakaoRoute = (startLat, startLng) => {
          let routeUrl = "";

          if (hasCoords) {
            routeUrl = `https://map.kakao.com/link/from/내위치,${startLat},${startLng}/to/${destinationName},${food.lat},${food.lng}`;
          } else {
            routeUrl = `https://map.kakao.com/link/search/${destinationAddress}`;
          }

          window.open(routeUrl, "_blank");
        };

        if (!navigator.geolocation) {
          showToast("위치 정보를 지원하지 않는 브라우저입니다");
          window.open(
            `https://map.kakao.com/link/search/${destinationAddress}`,
            "_blank",
          );
          return;
        }

        showToast("현재 위치를 확인하는 중입니다");

        navigator.geolocation.getCurrentPosition(
          (position) => {
            openKakaoRoute(position.coords.latitude, position.coords.longitude);
          },
          () => {
            showToast("현재 위치 권한을 허용해주세요");
            window.open(
              `https://map.kakao.com/link/search/${destinationAddress}`,
              "_blank",
            );
          },
          {
            enableHighAccuracy: true,
            timeout: 6000,
            maximumAge: 30000,
          },
        );
      }

      function toggleLike(foodId) {
        const set = new Set(state.likedIds);
        const willLike = !set.has(foodId);

        if (willLike) {
          set.add(foodId);
        } else {
          set.delete(foodId);
        }

        state.likedIds = [...set];
        localStorage.setItem("busanLikedFoods", JSON.stringify(state.likedIds));

        if (state.mode === "liked" && !willLike) {
          applyFilter();
        } else {
          updateLikeButtons(foodId, willLike);
        }

        showToast(
          willLike ? "즐겨찾기에 추가했습니다" : "즐겨찾기에서 해제했습니다",
        );
      }

      function setMode(mode) {
        state.mode = mode;
        allTab.classList.toggle("active", mode === "all");
        likeTab.classList.toggle("active", mode === "liked");
        applyFilter();
        showToast(mode === "all" ? "전체 맛집 보기" : "즐겨찾기 보기");
      }

      function clearSearch() {
        if (!searchInput.value && !state.keyword) return;
        searchInput.value = "";
        state.keyword = "";
        applyFilter();
      }

      function updateClearSearchButton() {
        clearSearchBtn.classList.toggle(
          "show",
          Boolean(searchInput.value || state.keyword),
        );
      }

      function updateKeywordChips() {
        document.querySelectorAll(".keyword-chip").forEach((chip) => {
          chip.classList.toggle(
            "active",
            chip.dataset.keyword === state.keyword,
          );
        });
      }

      function renderPagination(totalPages) {
        const pages = getPageNumbers(totalPages, state.currentPage);

        pagination.innerHTML = `
        <button class="page-btn" type="button" data-page="prev" ${state.currentPage === 1 ? "disabled" : ""}>‹</button>
        ${pages
          .map(
            (page) => `
            <button class="page-btn ${page === state.currentPage ? "active" : ""}" type="button" data-page="${page}">${page}</button>
          `,
          )
          .join("")}
        <button class="page-btn" type="button" data-page="next" ${state.currentPage === totalPages ? "disabled" : ""}>›</button>
      `;
      }

      function getPageNumbers(totalPages, currentPage) {
        const maxVisible = 5;
        let start = Math.max(1, currentPage - 2);
        let end = Math.min(totalPages, start + maxVisible - 1);

        if (end - start + 1 < maxVisible) {
          start = Math.max(1, end - maxVisible + 1);
        }

        const pages = [];
        for (let page = start; page <= end; page += 1) {
          pages.push(page);
        }
        return pages;
      }

      function movePage(page) {
        const totalPages = Math.ceil(
          state.filteredFoods.length / state.pageSize,
        );

        if (page === "prev") {
          state.currentPage -= 1;
        } else if (page === "next") {
          state.currentPage += 1;
        } else {
          state.currentPage = Number(page);
        }

        state.currentPage = Math.min(
          Math.max(state.currentPage, 1),
          totalPages,
        );
        renderList();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function updateLikeButtons(foodId, liked) {
        document.querySelectorAll(".food-card").forEach((card) => {
          if (card.dataset.id !== foodId) return;
          const likeButton = card.querySelector(".like-btn");
          if (!likeButton) return;
          likeButton.classList.toggle("liked", liked);
        });
      }

      function updateDetailTabsVisibility() {
        if (!detailPage.classList.contains("active")) return;

        const scrollBottom = window.scrollY + window.innerHeight;
        const pageBottom = document.documentElement.scrollHeight - 24;
        bottomTabs.classList.toggle(
          "show-on-bottom",
          scrollBottom >= pageBottom,
        );

        const shouldShowWriteButton =
          state.detailTab === "review" &&
          !reviewWritePage.classList.contains("active");
        reviewWriteFab.classList.toggle("show", shouldShowWriteButton);
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        clearTimeout(state.toastTimer);
        state.toastTimer = setTimeout(() => {
          toast.classList.remove("show");
        }, 1300);
      }

      function escapeHtml(text) {
        return String(text)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      searchForm.addEventListener("submit", (event) => {
        event.preventDefault();
        state.keyword = searchInput.value;
        applyFilter();
      });

      searchInput.addEventListener("input", () => {
        state.keyword = searchInput.value;
        applyFilter();
      });

      clearSearchBtn.addEventListener("click", clearSearch);

      quickKeywords.addEventListener("click", (event) => {
        const chip = event.target.closest(".keyword-chip");
        if (!chip) return;

        const keyword = chip.dataset.keyword;
        searchInput.value = keyword;
        state.keyword = keyword;
        applyFilter();
        showToast(`${keyword} 검색 결과입니다`);
      });

      pagination.addEventListener("click", (event) => {
        const button = event.target.closest(".page-btn");
        if (!button || button.disabled) return;
        movePage(button.dataset.page);
      });

      foodList.addEventListener("click", (event) => {
        const card = event.target.closest(".food-card");
        if (!card) return;

        const foodId = card.dataset.id;

        if (event.target.closest(".like-btn")) {
          toggleLike(foodId);
          return;
        }

        openDetail(foodId);
      });

      infoDetailTab.addEventListener("click", () => setDetailTab("info"));
      reviewDetailTab.addEventListener("click", () => setDetailTab("review"));
      reviewWriteFab.addEventListener("click", openReviewWritePage);
      reviewWriteBottomBtn.addEventListener("click", openReviewWritePage);
      directionBtn.addEventListener("click", openDirection);
      cancelReviewBtn.addEventListener("click", closeReviewWritePage);
      reviewForm.addEventListener("submit", saveReview);
      ratingSelect.addEventListener("click", (event) => {
        const button = event.target.closest(".rating-star");
        if (!button) return;
        setRating(Number(button.dataset.rating));
      });

      refreshBtn.addEventListener("click", loadFoods);
      topLikeBtn.addEventListener("click", () => setMode("liked"));
      allTab.addEventListener("click", () => {
        if (
          reviewWritePage.classList.contains("active") ||
          detailPage.classList.contains("active")
        )
          closeDetail();
        setMode("all");
      });

      likeTab.addEventListener("click", () => {
        if (
          reviewWritePage.classList.contains("active") ||
          detailPage.classList.contains("active")
        )
          closeDetail();
        setMode("liked");
      });
      backBtn.addEventListener("click", closeDetail);
      window.addEventListener("scroll", updateDetailTabsVisibility);

      loadFoods();
    </script>
  </body>
</html>
