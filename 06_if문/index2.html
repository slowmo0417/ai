<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>if(조건문 2형식)</title>
  </head>
  <body>
    <script>
      //if(조건식이 참일때 실행)
      //else조건식이 거짓일때 실행

      // 외부로부터 데이터를 받아 80점이상이면 합격 아니면 불합격
      let jumsu = prompt("점수를 입력하세요(0~100)?");
      if (jumsu >= 80) {
        alert("합격");
      } else {
        alert("불합격");
      }
    </script>
  </body>
</html>
