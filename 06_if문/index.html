<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>if제1형식</title>
  </head>
  <body>
    <script>
      //1.if문(조건문) 제 1형식
      //   if(조건식){참일때 실행}
      // 거짓일때 실행
      //외부로부터 data 입력받아서 그 점수가 80점 이상이면 합격
      let score = prompt("점수를 입력하세요?");
      if (score >= 80) {
        alert("합격");
      }
      if (score < 80) {
        alert("불합격");
      }
    </script>
  </body>
</html>
