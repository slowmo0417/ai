<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>카테고리 - ATELIER</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Pretendard",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #ffffff;
        color: #111111;
        overflow-x: hidden;
      }

      .app-container {
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        background: #ffffff;
        position: relative;
      }

      /* Header */
      .header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        max-width: 480px;
        margin: 0 auto;
        background: #ffffff;
        z-index: 50;
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      }

      .header-content {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
      }

      .header-left,
      .header-right {
        flex: 1;
        display: flex;
        align-items: center;
      }

      .header-right {
        justify-content: flex-end;
        gap: 16px;
      }

      .header-title {
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 0.03em;
        color: #111111;
        text-align: center;
      }

      .header-icon {
        padding: 4px;
        cursor: pointer;
        transition: opacity 0.2s;
        position: relative;
        background: none;
        border: none;
      }

      .header-icon:hover {
        opacity: 0.6;
      }

      /* Main Content */
      .main-content {
        padding-top: 60px;
        padding-bottom: 80px;
      }

      /* Category Grid */
      .category-grid-section {
        padding: 32px 20px;
      }

      .category-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }

      .category-card {
        position: relative;
        aspect-ratio: 1;
        border-radius: 12px;
        overflow: hidden;
        background: #f5f5f5;
        cursor: pointer;
        transition: transform 0.3s;
      }

      .category-card:hover {
        transform: translateY(-4px);
      }

      .category-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .category-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.5),
          rgba(0, 0, 0, 0.1)
        );
      }

      .category-label {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 20px;
        color: white;
      }

      .category-name {
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 0.05em;
        margin-bottom: 4px;
      }

      .category-count {
        font-size: 12px;
        font-weight: 400;
        opacity: 0.9;
      }

      /* Filter Bar */
      .filter-section {
        padding: 0 20px 24px;
      }

      .filter-bar {
        display: flex;
        gap: 8px;
        align-items: center;
        overflow-x: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      .filter-bar::-webkit-scrollbar {
        display: none;
      }

      .filter-btn {
        padding: 8px 16px;
        border-radius: 999px;
        white-space: nowrap;
        border: 1px solid rgba(0, 0, 0, 0.1);
        cursor: pointer;
        font-size: 13px;
        font-weight: 400;
        letter-spacing: 0.02em;
        transition: all 0.3s;
        background: #ffffff;
        color: #111111;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .filter-btn.active {
        background: #111111;
        color: #ffffff;
        border-color: #111111;
      }

      /* Tab Bar */
      .tab-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        max-width: 480px;
        margin: 0 auto;
        background: #ffffff;
        border-top: 1px solid rgba(0, 0, 0, 0.08);
        z-index: 50;
      }

      .tab-bar-content {
        display: flex;
        align-items: center;
        justify-content: space-around;
        padding: 12px 8px;
      }

      .tab-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        flex: 1;
        text-decoration: none;
      }

      .tab-icon {
        width: 22px;
        height: 22px;
        stroke: #777777;
        stroke-width: 1.5;
        fill: none;
      }

      .tab-item.active .tab-icon {
        stroke: #111111;
      }

      .tab-label {
        font-size: 11px;
        font-weight: 400;
        letter-spacing: 0.01em;
        color: #777777;
      }

      .tab-item.active .tab-label {
        color: #111111;
        font-weight: 500;
      }

      /* Icons */
      .icon {
        width: 20px;
        height: 20px;
        stroke: #111111;
        stroke-width: 1.5;
        fill: none;
      }

      .icon-sm {
        width: 16px;
        height: 16px;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <!-- Header -->
      <header class="header">
        <div class="header-content">
          <div class="header-left"></div>
          <h1 class="header-title">카테고리</h1>
          <div class="header-right">
            <button class="header-icon">
              <svg class="icon" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </svg>
            </button>
          </div>
        </div>
      </header>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Filter Bar -->
        <section class="filter-section">
          <div class="filter-bar">
            <button class="filter-btn active">전체</button>
            <button class="filter-btn">신상품</button>
            <button class="filter-btn">베스트</button>
            <button class="filter-btn">세일</button>
            <button class="filter-btn">
              <span>가격</span>
              <svg class="icon icon-sm" viewBox="0 0 24 24">
                <path d="m6 9 6 6 6-6"></path>
              </svg>
            </button>
          </div>
        </section>

        <!-- Category Grid -->
        <section class="category-grid-section">
          <div class="category-grid" id="categoryGrid">
            <!-- Categories will be inserted here by JavaScript -->
          </div>
        </section>
      </main>

      <!-- Tab Bar -->
      <nav class="tab-bar">
        <div class="tab-bar-content">
          <a href="index.html" class="tab-item">
            <svg class="tab-icon" viewBox="0 0 24 24">
              <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
              <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span class="tab-label">홈</span>
          </a>
          <a href="category.html" class="tab-item active">
            <svg class="tab-icon" viewBox="0 0 24 24">
              <rect width="7" height="7" x="3" y="3" rx="1"></rect>
              <rect width="7" height="7" x="14" y="3" rx="1"></rect>
              <rect width="7" height="7" x="14" y="14" rx="1"></rect>
              <rect width="7" height="7" x="3" y="14" rx="1"></rect>
            </svg>
            <span class="tab-label">카테고리</span>
          </a>
          <a href="cart.html" class="tab-item">
            <svg class="tab-icon" viewBox="0 0 24 24">
              <path
                d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"
              ></path>
              <path d="M3 6h18"></path>
              <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
            <span class="tab-label">장바구니</span>
          </a>
          <a href="mypage.html" class="tab-item">
            <svg class="tab-icon" viewBox="0 0 24 24">
              <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span class="tab-label">마이페이지</span>
          </a>
        </div>
      </nav>
    </div>

    <script>
      // Category data
      const categories = [
        {
          id: 1,
          name: "OUTER",
          count: "48 items",
          image:
            "https://images.unsplash.com/photo-1554412933-514a83d2f3c8?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxlbGVnYW50JTIwd29tYW4lMjBkZXNpZ25lciUyMGNvYXQlMjBtaW5pbWFsfGVufDF8fHx8MTc3NDkyNjkwNXww&ixlib=rb-4.1.0&q=80&w=1080",
        },
        {
          id: 2,
          name: "TOP",
          count: "62 items",
          image:
            "https://images.unsplash.com/photo-1762331974989-417a274b2c2b?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxmYXNoaW9uJTIwd29tYW4lMjBibGF6ZXIlMjBlbGVnYW50fGVufDF8fHx8MTc3NDkyNjkwNXww&ixlib=rb-4.1.0&q=80&w=1080",
        },
        {
          id: 3,
          name: "BOTTOM",
          count: "38 items",
          image:
            "https://images.unsplash.com/photo-1709920668708-90df0211e4d0?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHx1cmJhbiUyMHdvbWFuJTIwc3R5bGUlMjBtaW5pbWFsfGVufDF8fHx8MTc3NDkyNjkwN3ww&ixlib=rb-4.1.0&q=80&w=1080",
        },
        {
          id: 4,
          name: "DRESS",
          count: "34 items",
          image:
            "https://images.unsplash.com/photo-1585672275656-4433fc0668e7?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxtaW5pbWFsaXN0JTIwd29tYW4lMjBkcmVzcyUyMHdoaXRlfGVufDF8fHx8MTc3NDkyNjkwNXww&ixlib=rb-4.1.0&q=80&w=1080",
        },
        {
          id: 5,
          name: "KNIT",
          count: "28 items",
          image:
            "https://images.unsplash.com/photo-1759229874914-c1ffdb3ebd0c?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHx3b21hbiUyMGVsZWdhbnQlMjBzd2VhdGVyJTIwbmV1dHJhbHxlbnwxfHx8fDE3NzQ5MjY5MDZ8MA&ixlib=rb-4.1.0&q=80&w=1080",
        },
        {
          id: 6,
          name: "ACC",
          count: "42 items",
          image:
            "https://images.unsplash.com/photo-1700575306910-b7016feddcd1?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxmYXNoaW9uJTIwZWRpdG9yaWFsJTIwd29tYW4lMjBsb29rYm9va3xlbnwxfHx8fDE3NzQ5MjY5MDZ8MA&ixlib=rb-4.1.0&q=80&w=1080",
        },
      ];

      // Render categories
      function renderCategories() {
        const categoryGrid = document.getElementById("categoryGrid");
        categoryGrid.innerHTML = categories
          .map(
            (category) => `
        <div class="category-card">
          <img src="${category.image}" alt="${category.name}">
          <div class="category-overlay"></div>
          <div class="category-label">
            <h3 class="category-name">${category.name}</h3>
            <p class="category-count">${category.count}</p>
          </div>
        </div>
      `,
          )
          .join("");
      }

      // Filter buttons
      const filterButtons = document.querySelectorAll(".filter-btn");
      filterButtons.forEach((button) => {
        button.addEventListener("click", () => {
          filterButtons.forEach((btn) => btn.classList.remove("active"));
          button.classList.add("active");
        });
      });

      // Initialize
      renderCategories();
    </script>
  </body>
</html>
