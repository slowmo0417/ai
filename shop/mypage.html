<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>마이페이지 - ATELIER</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Pretendard",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #ffffff;
        color: #111111;
        overflow-x: hidden;
      }

      .app-container {
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        background: #ffffff;
        position: relative;
      }

      /* Header */
      .header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        max-width: 480px;
        margin: 0 auto;
        background: #ffffff;
        z-index: 50;
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      }

      .header-content {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
      }

      .header-left,
      .header-right {
        flex: 1;
        display: flex;
        align-items: center;
      }

      .header-right {
        justify-content: flex-end;
      }

      .header-title {
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 0.03em;
        color: #111111;
        text-align: center;
      }

      .header-icon {
        padding: 4px;
        cursor: pointer;
        transition: opacity 0.2s;
        background: none;
        border: none;
      }

      .header-icon:hover {
        opacity: 0.6;
      }

      /* Main Content */
      .main-content {
        padding-top: 60px;
        padding-bottom: 80px;
      }

      /* Profile Section */
      .profile-section {
        padding: 32px 20px;
        border-bottom: 8px solid #f5f5f5;
      }

      .profile-info {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 24px;
      }

      .profile-avatar {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: #f5f5f5;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .profile-avatar svg {
        width: 32px;
        height: 32px;
        stroke: #777777;
        stroke-width: 1.5;
        fill: none;
      }

      .profile-details {
        flex: 1;
      }

      .profile-name {
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 0.02em;
        color: #111111;
        margin-bottom: 4px;
      }

      .profile-email {
        font-size: 14px;
        color: #777777;
        font-weight: 400;
      }

      .profile-stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }

      .stat-card {
        background: #f5f5f5;
        border-radius: 12px;
        padding: 16px;
        text-align: center;
        cursor: pointer;
        transition: background 0.2s;
      }

      .stat-card:hover {
        background: #ebebeb;
      }

      .stat-value {
        font-size: 20px;
        font-weight: 500;
        letter-spacing: 0.02em;
        color: #111111;
        margin-bottom: 4px;
      }

      .stat-label {
        font-size: 12px;
        color: #777777;
        font-weight: 400;
      }

      /* Menu Section */
      .menu-section {
        padding: 24px 20px;
      }

      .menu-group {
        margin-bottom: 32px;
      }

      .menu-group:last-child {
        margin-bottom: 0;
      }

      .menu-title {
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.03em;
        color: #777777;
        margin-bottom: 12px;
        padding: 0 4px;
      }

      .menu-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 4px;
        cursor: pointer;
        transition: opacity 0.2s;
        text-decoration: none;
        color: inherit;
      }

      .menu-item:hover {
        opacity: 0.6;
      }

      .menu-item-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .menu-icon {
        width: 20px;
        height: 20px;
        stroke: #111111;
        stroke-width: 1.5;
        fill: none;
      }

      .menu-label {
        font-size: 15px;
        font-weight: 400;
        letter-spacing: 0.01em;
        color: #111111;
      }

      .menu-chevron {
        width: 16px;
        height: 16px;
        stroke: #aaaaaa;
        stroke-width: 1.5;
        fill: none;
      }

      /* Badge */
      .badge {
        background: #a8b3c2;
        color: white;
        font-size: 11px;
        font-weight: 500;
        padding: 2px 8px;
        border-radius: 999px;
        margin-left: 8px;
      }

      /* Tab Bar */
      .tab-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        max-width: 480px;
        margin: 0 auto;
        background: #ffffff;
        border-top: 1px solid rgba(0, 0, 0, 0.08);
        z-index: 50;
      }

      .tab-bar-content {
        display: flex;
        align-items: center;
        justify-content: space-around;
        padding: 12px 8px;
      }

      .tab-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        flex: 1;
        text-decoration: none;
      }

      .tab-icon {
        width: 22px;
        height: 22px;
        stroke: #777777;
        stroke-width: 1.5;
        fill: none;
      }

      .tab-item.active .tab-icon {
        stroke: #111111;
      }

      .tab-label {
        font-size: 11px;
        font-weight: 400;
        letter-spacing: 0.01em;
        color: #777777;
      }

      .tab-item.active .tab-label {
        color: #111111;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
