<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATELIER - Designer Fashion</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Pretendard",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #ffffff;
        color: #111111;
        overflow-x: hidden;
      }

      .app-container {
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        background: #ffffff;
        position: relative;
      }

      /* Header */
      .header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        max-width: 480px;
        margin: 0 auto;
        background: #ffffff;
        z-index: 50;
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      }

      .header-content {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
      }

      .header-left,
      .header-right {
        flex: 1;
        display: flex;
        align-items: center;
      }

      .header-right {
        justify-content: flex-end;
        gap: 16px;
      }

      .header-title {
        font-size: 18px;
        font-weight: 400;
        letter-spacing: 0.15em;
        color: #111111;
        text-align: center;
      }

      .header-icon {
        padding: 4px;
        cursor: pointer;
        transition: opacity 0.2s;
        position: relative;
      }

      .header-icon:hover {
        opacity: 0.6;
      }

      .cart-badge {
        position: absolute;
        top: -4px;
        right: -4px;
        width: 16px;
        height: 16px;
        background: #a8b3c2;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 10px;
        font-weight: 500;
      }

      /* Main Content */
      .main-content {
        padding-top: 60px;
        padding-bottom: 80px;
      }

      /* Hero Banner */
      .hero-section {
        padding: 24px 20px 32px;
      }

      .hero-banner {
        position: relative;
        aspect-ratio: 16/9;
        border-radius: 16px;
        overflow: hidden;
      }

      .hero-banner img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .hero-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to right, rgba(0, 0, 0, 0.4), transparent);
      }

      .hero-content {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 24px;
        color: white;
      }

      .hero-subtitle {
        font-size: 12px;
        font-weight: 400;
        letter-spacing: 0.15em;
        opacity: 0.9;
        margin-bottom: 8px;
      }

      .hero-title {
        font-size: 24px;
        font-weight: 500;
        letter-spacing: 0.02em;
        margin-bottom: 8px;
      }

      .hero-description {
        font-size: 14px;
        font-weight: 400;
        opacity: 0.9;
      }

      /* Category Filter */
      .category-section {
        padding: 0 20px 32px;
      }

      .category-filter {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      .category-filter::-webkit-scrollbar {
        display: none;
      }

      .category-btn {
        padding: 10px 20px;
        border-radius: 999px;
        white-space: nowrap;
        border: none;
        cursor: pointer;
        font-size: 14px;
        font-weight: 400;
        letter-spacing: 0.02em;
        transition: all 0.3s;
        background: #f5f5f5;
        color: #111111;
      }

      .category-btn.active {
        background: #111111;
        color: #ffffff;
      }

      /* Section Header */
      .section {
        padding: 0 20px 48px;
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
      }

      .section-title-group h2 {
        font-size: 20px;
        font-weight: 500;
        letter-spacing: 0.03em;
        color: #111111;
        margin-bottom: 4px;
      }

      .section-subtitle {
        font-size: 14px;
        color: #777777;
        font-weight: 400;
      }

      .view-all-btn {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 14px;
        color: #777777;
        font-weight: 400;
        background: none;
        border: none;
        cursor: pointer;
        transition: opacity 0.2s;
      }

      .view-all-btn:hover {
        opacity: 0.6;
      }

      /* Product Grid */
      .product-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 32px 16px;
      }

      .product-card {
        display: flex;
        flex-direction: column;
        gap: 12px;
        cursor: pointer;
      }

      .product-image-wrapper {
        position: relative;
        aspect-ratio: 3/4;
        overflow: hidden;
        border-radius: 8px;
        background: #f5f5f5;
      }

      .product-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s;
      }

      .product-card:hover .product-image {
        transform: scale(1.05);
      }

      .product-tag {
        position: absolute;
        top: 12px;
        left: 12px;
        padding: 6px 12px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(4px);
        border-radius: 999px;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.02em;
      }

      .product-info {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 0 4px;
      }

      .product-name {
        font-size: 14px;
        font-weight: 400;
        letter-spacing: 0.01em;
        color: #111111;
      }

      .product-price {
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.02em;
        color: #111111;
      }

      /* Lookbook Grid */
      .lookbook-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }

      .lookbook-card {
        position: relative;
        cursor: pointer;
      }

      .lookbook-image-wrapper {
        aspect-ratio: 4/5;
        overflow: hidden;
        border-radius: 8px;
      }

      .lookbook-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.7s;
      }

      .lookbook-card:hover .lookbook-image {
        transform: scale(1.05);
      }

      .lookbook-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.5), transparent);
        border-radius: 8px;
      }

      .lookbook-content {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 20px;
        color: white;
      }

      .lookbook-title {
        font-size: 16px;
        font-weight: 500;
        letter-spacing: 0.02em;
        margin-bottom: 4px;
      }

      .lookbook-subtitle {
        font-size: 12px;
        font-weight: 400;
        letter-spacing: 0.03em;
        opacity: 0.9;
      }

      /* Featured Banner */
      .featured-banner {
        position: relative;
        aspect-ratio: 4/3;
        border-radius: 16px;
        overflow: hidden;
        background: #f5f5f5;
      }

      .featured-banner img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .featured-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.5), transparent);
      }

      .featured-content {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 24px;
        color: white;
      }

      .featured-subtitle {
        font-size: 12px;
        font-weight: 400;
        letter-spacing: 0.15em;
        opacity: 0.9;
        margin-bottom: 8px;
      }

      .featured-title {
        font-size: 20px;
        font-weight: 500;
        letter-spacing: 0.02em;
        margin-bottom: 8px;
      }

      .featured-description {
        font-size: 14px;
        font-weight: 400;
        opacity: 0.9;
      }

      /* Tab Bar */
      .tab-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        max-width: 480px;
        margin: 0 auto;
        background: #ffffff;
        border-top: 1px solid rgba(0, 0, 0, 0.08);
        z-index: 50;
      }

      .tab-bar-content {
        display: flex;
        align-items: center;
        justify-content: space-around;
        padding: 12px 8px;
      }

      .tab-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        flex: 1;
        background: none;
        border: none;
        cursor: pointer;
        transition: all 0.2s;
      }

      .tab-icon {
        width: 22px;
        height: 22px;
        stroke: #777777;
        stroke-width: 1.5;
        fill: none;
      }

      .tab-item.active .tab-icon {
        stroke: #111111;
      }

      .tab-label {
        font-size: 11px;
        font-weight: 400;
        letter-spacing: 0.01em;
        color: #777777;
      }

      .tab-item.active .tab-label {
        color: #111111;
        font-weight: 500;
      }

      /* SVG Icons */
      .icon {
        width: 20px;
        height: 20px;
        stroke: #111111;
        stroke-width: 1.5;
        fill: none;
      }

      .icon-chevron {
        width: 16px;
        height: 16px;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <!-- Header -->
      <header class="header">
        <div class="header-content">
          <div class="header-left"></div>
          <h1 class="header-title">ATELIER</h1>
          <div class="header-right">
            <button class="header-icon">
              <svg class="icon" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </svg>
            </button>
            <button class="header-icon">
              <svg class="icon" viewBox="0 0 24 24">
                <path
                  d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"
                ></path>
                <path d="M3 6h18"></path>
                <path d="M16 10a4 4 0 0 1-8 0"></path>
              </svg>
              <span class="cart-badge">2</span>
            </button>
          </div>
        </div>
      </header>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Hero Banner -->
        <section class="hero-section">
          <div class="hero-banner">
            <img
              src="https://images.unsplash.com/photo-1774571953839-5e0f6f7f28bf?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxkZXNpZ25lciUyMGZhc2hpb24lMjBiYW5uZXIlMjBsdXh1cnl8ZW58MXx8fHwxNzc0OTI2OTA3fDA&ixlib=rb-4.1.0&q=80&w=1080&utm_source=figma&utm_medium=referral"
              alt="Spring Collection"
            />
            <div class="hero-overlay"></div>
            <div class="hero-content">
              <p class="hero-subtitle">SPECIAL CURATION</p>
              <h2 class="hero-title">Spring Essentials</h2>
              <p class="hero-description">도시를 위한 감각적인 봄 컬렉션</p>
            </div>
          </div>
        </section>

        <!-- Category Filter -->
        <section class="category-section">
          <div class="category-filter" id="categoryFilter">
            <button class="category-btn active" data-category="all">ALL</button>
            <button class="category-btn" data-category="outer">OUTER</button>
            <button class="category-btn" data-category="top">TOP</button>
            <button class="category-btn" data-category="bottom">BOTTOM</button>
            <button class="category-btn" data-category="dress">DRESS</button>
          </div>
        </section>

        <!-- New Arrivals -->
        <section class="section">
          <div class="section-header">
            <div class="section-title-group">
              <h2>New Arrivals</h2>
              <p class="section-subtitle">이번 시즌 새로운 컬렉션</p>
            </div>
            <button class="view-all-btn">
              <span>전체보기</span>
              <svg class="icon icon-chevron" viewBox="0 0 24 24">
                <path d="m9 18 6-6-6-6"></path>
              </svg>
            </button>
          </div>
          <div class="product-grid" id="productGrid">
            <!-- Products will be inserted here by JavaScript -->
          </div>
        </section>

        <!-- Style Edit / Lookbook -->
        <section class="section">
          <div class="section-header">
            <div class="section-title-group">
              <h2>Style Edit</h2>
              <p class="section-subtitle">에디터가 제안하는 스타일링</p>
            </div>
            <button class="view-all-btn">
              <span>전체보기</span>
              <svg class="icon icon-chevron" viewBox="0 0 24 24">
                <path d="m9 18 6-6-6-6"></path>
              </svg>
            </button>
          </div>
          <div class="lookbook-grid" id="lookbookGrid">
            <!-- Lookbooks will be inserted here by JavaScript -->
          </div>
        </section>

        <!-- Featured Banner -->
        <section class="section">
          <div class="featured-banner">
            <img
              src="https://images.unsplash.com/photo-1678723357379-d87f2a0ec8ec?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHx3b21hbiUyMGZhc2hpb24lMjBwb3J0cmFpdCUyMHNvcGhpc3RpY2F0ZWR8ZW58MXx8fHwxNzc0OTI2OTA3fDA&ixlib=rb-4.1.0&q=80&w=1080&utm_source=figma&utm_medium=referral"
              alt="Featured"
            />
            <div class="featured-overlay"></div>
            <div class="featured-content">
              <p class="featured-subtitle">BRAND FOCUS</p>
              <h3 class="featured-title">Contemporary Labels</h3>
              <p class="featured-description">주목받는 디자이너 브랜드</p>
            </div>
          </div>
        </section>
      </main>

      <!-- Tab Bar -->
      <nav class="tab-bar">
        <div class="tab-bar-content">
          <a href="index.html" class="tab-item active" data-tab="home">
            <svg class="tab-icon" viewBox="0 0 24 24">
              <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
              <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span class="tab-label">홈</span>
          </a>
          <a href="category.html" class="tab-item" data-tab="category">
            <svg class="tab-icon" viewBox="0 0 24 24">
              <rect width="7" height="7" x="3" y="3" rx="1"></rect>
              <rect width="7" height="7" x="14" y="3" rx="1"></rect>
              <rect width="7" height="7" x="14" y="14" rx="1"></rect>
              <rect width="7" height="7" x="3" y="14" rx="1"></rect>
            </svg>
            <span class="tab-label">카테고리</span>
          </a>
          <a href="cart.html" class="tab-item" data-tab="cart">
            <svg class="tab-icon" viewBox="0 0 24 24">
              <path
                d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"
              ></path>
              <path d="M3 6h18"></path>
              <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
            <span class="tab-label">장바구니</span>
          </a>
          <a href="mypage.html" class="tab-item" data-tab="mypage">
            <svg class="tab-icon" viewBox="0 0 24 24">
              <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span class="tab-label">마이페이지</span>
          </a>
        </div>
      </nav>
    </div>

    <script>
      // Product data
      const products = [
        {
          id: 1,
          image:
            "https://images.unsplash.com/photo-1554412933-514a83d2f3c8?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxlbGVnYW50JTIwd29tYW4lMjBkZXNpZ25lciUyMGNvYXQlMjBtaW5pbWFsfGVufDF8fHx8MTc3NDkyNjkwNXww&ixlib=rb-4.1.0&q=80&w=1080&utm_source=figma&utm_medium=referral",
          name: "Cashmere Blend Coat",
          price: "₩428,000",
          tag: "NEW",
        },
        {
          id: 2,
          image:
            "https://images.unsplash.com/photo-1762331974989-417a274b2c2b?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxmYXNoaW9uJTIwd29tYW4lMjBibGF6ZXIlMjBlbGVnYW50fGVufDF8fHx8MTc3NDkyNjkwNXww&ixlib=rb-4.1.0&q=80&w=1080&utm_source=figma&utm_medium=referral",
          name: "Tailored Wool Blazer",
          price: "₩368,000",
          tag: "NEW",
        },
        {
          id: 3,
          image:
            "https://images.unsplash.com/photo-1585672275656-4433fc0668e7?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxtaW5pbWFsaXN0JTIwd29tYW4lMjBkcmVzcyUyMHdoaXRlfGVufDF8fHx8MTc3NDkyNjkwNXww&ixlib=rb-4.1.0&q=80&w=1080&utm_source=figma&utm_medium=referral",
          name: "Minimal Slip Dress",
          price: "₩248,000",
        },
        {
          id: 4,
          image:
            "https://images.unsplash.com/photo-1759229874914-c1ffdb3ebd0c?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHx3b21hbiUyMGVsZWdhbnQlMjBzd2VhdGVyJTIwbmV1dHJhbHxlbnwxfHx8fDE3NzQ5MjY5MDZ8MA&ixlib=rb-4.1.0&q=80&w=1080&utm_source=figma&utm_medium=referral",
          name: "Merino Wool Knit",
          price: "₩198,000",
        },
      ];

      // Lookbook data
      const lookbooks = [
        {
          id: 1,
          image:
            "https://images.unsplash.com/photo-1700575306910-b7016feddcd1?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxmYXNoaW9uJTIwZWRpdG9yaWFsJTIwd29tYW4lMjBsb29rYm9va3xlbnwxfHx8fDE3NzQ5MjY5MDZ8MA&ixlib=rb-4.1.0&q=80&w=1080&utm_source=figma&utm_medium=referral",
          title: "Spring Editorial",
          subtitle: "2026 Season Collection",
        },
        {
          id: 2,
          image:
            "https://images.unsplash.com/photo-1709920668708-90df0211e4d0?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHx1cmJhbiUyMHdvbWFuJTIwc3R5bGUlMjBtaW5pbWFsfGVufDF8fHx8MTc3NDkyNjkwN3ww&ixlib=rb-4.1.0&q=80&w=1080&utm_source=figma&utm_medium=referral",
          title: "Urban Minimal",
          subtitle: "City Chic Style",
        },
      ];

      // Render products
      function renderProducts() {
        const productGrid = document.getElementById("productGrid");
        productGrid.innerHTML = products
          .map(
            (product) => `
        <div class="product-card">
          <div class="product-image-wrapper">
            <img src="${product.image}" alt="${product.name}" class="product-image">
            ${product.tag ? `<div class="product-tag">${product.tag}</div>` : ""}
          </div>
          <div class="product-info">
            <h3 class="product-name">${product.name}</h3>
            <p class="product-price">${product.price}</p>
          </div>
        </div>
      `,
          )
          .join("");
      }

      // Render lookbooks
      function renderLookbooks() {
        const lookbookGrid = document.getElementById("lookbookGrid");
        lookbookGrid.innerHTML = lookbooks
          .map(
            (lookbook) => `
        <div class="lookbook-card">
          <div class="lookbook-image-wrapper">
            <img src="${lookbook.image}" alt="${lookbook.title}" class="lookbook-image">
          </div>
          <div class="lookbook-overlay"></div>
          <div class="lookbook-content">
            <h3 class="lookbook-title">${lookbook.title}</h3>
            <p class="lookbook-subtitle">${lookbook.subtitle}</p>
          </div>
        </div>
      `,
          )
          .join("");
      }

      // Category filter
      const categoryButtons = document.querySelectorAll(".category-btn");
      categoryButtons.forEach((button) => {
        button.addEventListener("click", () => {
          categoryButtons.forEach((btn) => btn.classList.remove("active"));
          button.classList.add("active");
        });
      });

      // Initialize
      renderProducts();
      renderLookbooks();
    </script>
  </body>
</html>
