<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>장바구니 - ATELIER</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Pretendard",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #ffffff;
        color: #111111;
        overflow-x: hidden;
      }

      .app-container {
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        background: #ffffff;
        position: relative;
      }

      /* Header */
      .header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        max-width: 480px;
        margin: 0 auto;
        background: #ffffff;
        z-index: 50;
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      }

      .header-content {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
      }

      .header-left,
      .header-right {
        flex: 1;
        display: flex;
        align-items: center;
      }

      .header-right {
        justify-content: flex-end;
      }

      .header-title {
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 0.03em;
        color: #111111;
        text-align: center;
      }

      /* Main Content */
      .main-content {
        padding-top: 60px;
        padding-bottom: 160px;
      }

      /* Cart Items */
      .cart-section {
        padding: 24px 20px;
      }

      .cart-item {
        display: flex;
        gap: 16px;
        padding: 20px 0;
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      }

      .cart-item:first-child {
        padding-top: 0;
      }

      .cart-item-image {
        width: 100px;
        aspect-ratio: 3/4;
        border-radius: 8px;
        overflow: hidden;
        background: #f5f5f5;
        flex-shrink: 0;
      }

      .cart-item-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .cart-item-info {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .cart-item-name {
        font-size: 15px;
        font-weight: 400;
        letter-spacing: 0.01em;
        color: #111111;
      }

      .cart-item-option {
        font-size: 13px;
        color: #777777;
        font-weight: 400;
      }

      .cart-item-price {
        font-size: 16px;
        font-weight: 500;
        letter-spacing: 0.02em;
        color: #111111;
        margin-top: auto;
      }

      .cart-item-controls {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 8px;
      }

      .quantity-control {
        display: flex;
        align-items: center;
        gap: 12px;
        border: 1px solid rgba(0, 0, 0, 0.1);
        border-radius: 6px;
        padding: 6px 12px;
      }

      .quantity-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #111111;
        font-size: 16px;
        font-weight: 400;
      }

      .quantity-value {
        font-size: 14px;
        font-weight: 400;
        min-width: 24px;
        text-align: center;
      }

      .delete-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
        color: #777777;
      }

      .delete-btn:hover {
        color: #111111;
      }

      /* Empty Cart */
      .empty-cart {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px 20px;
        text-align: center;
      }

      .empty-cart-icon {
        width: 64px;
        height: 64px;
        margin-bottom: 20px;
        stroke: #cccccc;
        stroke-width: 1.5;
        fill: none;
      }

      .empty-cart-text {
        font-size: 16px;
        color: #777777;
        font-weight: 400;
        margin-bottom: 8px;
      }

      .empty-cart-subtext {
        font-size: 14px;
        color: #aaaaaa;
        font-weight: 400;
      }

      /* Summary */
      .cart-summary {
        position: fixed;
        bottom: 64px;
        left: 0;
        right: 0;
        max-width: 480px;
        margin: 0 auto;
        background: #ffffff;
        border-top: 1px solid rgba(0, 0, 0, 0.08);
        padding: 20px;
        z-index: 40;
      }

      .summary-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .summary-label {
        font-size: 14px;
        color: #777777;
        font-weight: 400;
      }

      .summary-value {
        font-size: 14px;
        color: #111111;
        font-weight: 400;
      }

      .summary-total {
        padding-top: 12px;
        border-top: 1px solid rgba(0, 0, 0, 0.06);
        margin-bottom: 16px;
      }

      .summary-total .summary-label {
        font-size: 15px;
        color: #111111;
        font-weight: 500;
      }

      .summary-total .summary-value {
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 0.02em;
      }

      .checkout-btn {
        width: 100%;
        padding: 16px;
        background: #111111;
        color: #ffffff;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 500;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition: opacity 0.2s;
      }

      .checkout-btn:hover {
        opacity: 0.9;
      }

      /* Tab Bar */
      .tab-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        max-width: 480px;
        margin: 0 auto;
        background: #ffffff;
        border-top: 1px solid rgba(0, 0, 0, 0.08);
        z-index: 50;
      }

      .tab-bar-content {
        display: flex;
        align-items: center;
        justify-content: space-around;
        padding: 12px 8px;
      }

      .tab-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        flex: 1;
        text-decoration: none;
      }

      .tab-icon {
        width: 22px;
        height: 22px;
        stroke: #777777;
        stroke-width: 1.5;
        fill: none;
      }

      .tab-item.active .tab-icon {
        stroke: #111111;
      }

      .tab-label {
        font-size: 11px;
        font-weight: 400;
        letter-spacing: 0.01em;
        color: #777777;
      }

      .tab-item.active .tab-label {
        color: #111111;
        font-weight: 500;
      }

      /* Icons */
      .icon {
        width: 20px;
        height: 20px;
        stroke: currentColor;
        stroke-width: 1.5;
        fill: none;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <!-- Header -->
      <header class="header">
        <div class="header-content">
          <div class="header-left"></div>
          <h1 class="header-title">장바구니</h1>
          <div class="header-right"></div>
        </div>
      </header>

      <!-- Main Content -->
      <main class="main-content">
        <section class="cart-section" id="cartSection">
          <!-- Cart items will be inserted here by JavaScript -->
        </section>
      </main>

      <!-- Cart Summary -->
      <div class="cart-summary" id="cartSummary" style="display: none">
        <div class="summary-row">
          <span class="summary-label">상품금액</span>
          <span class="summary-value" id="subtotal">₩0</span>
        </div>
        <div class="summary-row">
          <span class="summary-label">배송비</span>
          <span class="summary-value" id="shipping">₩3,000</span>
        </div>
        <div class="summary-row summary-total">
          <span class="summary-label">총 결제금액</span>
          <span class="summary-value" id="total">₩0</span>
        </div>
        <button class="checkout-btn">주문하��</button>
      </div>

      <!-- Tab Bar -->
      <nav class="tab-bar">
        <div class="tab-bar-content">
          <a href="index.html" class="tab-item">
            <svg class="tab-icon" viewBox="0 0 24 24">
              <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
              <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span class="tab-label">홈</span>
          </a>
          <a href="category.html" class="tab-item">
            <svg class="tab-icon" viewBox="0 0 24 24">
              <rect width="7" height="7" x="3" y="3" rx="1"></rect>
              <rect width="7" height="7" x="14" y="3" rx="1"></rect>
              <rect width="7" height="7" x="14" y="14" rx="1"></rect>
              <rect width="7" height="7" x="3" y="14" rx="1"></rect>
            </svg>
            <span class="tab-label">카테고리</span>
          </a>
          <a href="cart.html" class="tab-item active">
            <svg class="tab-icon" viewBox="0 0 24 24">
              <path
                d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"
              ></path>
              <path d="M3 6h18"></path>
              <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
            <span class="tab-label">장바구니</span>
          </a>
          <a href="mypage.html" class="tab-item">
            <svg class="tab-icon" viewBox="0 0 24 24">
              <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span class="tab-label">마이페이지</span>
          </a>
        </div>
      </nav>
    </div>

    <script>
      // Cart data
      let cartItems = [
        {
          id: 1,
          name: "Cashmere Blend Coat",
          option: "Black / Size M",
          price: 428000,
          quantity: 1,
          image:
            "https://images.unsplash.com/photo-1554412933-514a83d2f3c8?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxlbGVnYW50JTIwd29tYW4lMjBkZXNpZ25lciUyMGNvYXQlMjBtaW5pbWFsfGVufDF8fHx8MTc3NDkyNjkwNXww&ixlib=rb-4.1.0&q=80&w=1080",
        },
        {
          id: 2,
          name: "Tailored Wool Blazer",
          option: "Grey / Size S",
          price: 368000,
          quantity: 1,
          image:
            "https://images.unsplash.com/photo-1762331974989-417a274b2c2b?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxmYXNoaW9uJTIwd29tYW4lMjBibGF6ZXIlMjBlbGVnYW50fGVufDF8fHx8MTc3NDkyNjkwNXww&ixlib=rb-4.1.0&q=80&w=1080",
        },
      ];

      function formatPrice(price) {
        return `₩${price.toLocaleString()}`;
      }

      function calculateTotal() {
        return cartItems.reduce(
          (sum, item) => sum + item.price * item.quantity,
          0,
        );
      }

      function updateSummary() {
        const subtotal = calculateTotal();
        const shipping = subtotal > 0 ? 3000 : 0;
        const total = subtotal + shipping;

        document.getElementById("subtotal").textContent = formatPrice(subtotal);
        document.getElementById("shipping").textContent =
          shipping > 0 ? formatPrice(shipping) : "무료";
        document.getElementById("total").textContent = formatPrice(total);
      }

      function renderCart() {
        const cartSection = document.getElementById("cartSection");
        const cartSummary = document.getElementById("cartSummary");

        if (cartItems.length === 0) {
          cartSection.innerHTML = `
          <div class="empty-cart">
            <svg class="empty-cart-icon" viewBox="0 0 24 24">
              <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
              <path d="M3 6h18"></path>
              <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
            <p class="empty-cart-text">장바구니가 비어있습니다</p>
            <p class="empty-cart-subtext">마음에 드는 상품을 담아보세요</p>
          </div>
        `;
          cartSummary.style.display = "none";
        } else {
          cartSection.innerHTML = cartItems
            .map(
              (item, index) => `
          <div class="cart-item">
            <div class="cart-item-image">
              <img src="${item.image}" alt="${item.name}">
            </div>
            <div class="cart-item-info">
              <h3 class="cart-item-name">${item.name}</h3>
              <p class="cart-item-option">${item.option}</p>
              <p class="cart-item-price">${formatPrice(item.price * item.quantity)}</p>
              <div class="cart-item-controls">
                <div class="quantity-control">
                  <button class="quantity-btn" onclick="updateQuantity(${index}, -1)">−</button>
                  <span class="quantity-value">${item.quantity}</span>
                  <button class="quantity-btn" onclick="updateQuantity(${index}, 1)">+</button>
                </div>
                <button class="delete-btn" onclick="removeItem(${index})">
                  <svg class="icon" viewBox="0 0 24 24">
                    <path d="M3 6h18"></path>
                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                    <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        `,
            )
            .join("");
          cartSummary.style.display = "block";
          updateSummary();
        }
      }

      function updateQuantity(index, change) {
        cartItems[index].quantity += change;
        if (cartItems[index].quantity < 1) {
          cartItems[index].quantity = 1;
        }
        renderCart();
      }

      function removeItem(index) {
        cartItems.splice(index, 1);
        renderCart();
      }

      // Initialize
      renderCart();
    </script>
  </body>
</html>
