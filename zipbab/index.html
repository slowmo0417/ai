<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>집반찬연구소</title>
    <link rel="stylesheet" href="./css/style.css" />

  <body>

      <div class="search"></div>
      <!-- 로고 -->

      <!-- 오른쪽 -->
      <div class="right"></div>
    </header>
    <section id="slider"></section>
    <main>
      <!-- 반찬영역 -->
      <div class="banchan"></div>
      <!-- 정기적반찬 -->

      <!-- 신규반찬 -->
      <div class="newbanchan"></div>
      <!-- 배너영역 -->
      <div class="banner">
        <img
          src="./images/banner/imgi_15_pc_1.jpg"
          width="100%"
          height="100%"
          alt=""
        />
      </div>
      <!-- MD추천반찬 -->
      <div class="mdbanchan"></div>
    </main>
    <footer>
      <!-- 왼쪽 푸터 -->
      <!-- 오른쪽 푸터 -->
      <div class="leftfoot"></div>
      <div class="rightfoot"></div>
    </footer>
  </body>
</html>
