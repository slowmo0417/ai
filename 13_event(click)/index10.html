<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>클릭이벤트</title>
    <style>
      .box {
        width: 646px;
        display: flex;
        gap: 20px;
      }
      .box div {
        width: 200px;
        height: 200px;
        border: 1px solid #000;
      }
      .orange {
        background: orange;
      }
      .lightblue {
        background: lightblue;
      }
      .lighepurple {
        background: lavender;
      }
    </style>
  </head>
  <body>
    <h1>자바스크립트 함수</h1>
    <button id="btn1">숨김</button>
    <button id="btn2">보이기</button>
    <button id="btn3">토글</button>
    <button id="btn4">늘리기</button>
    <button id="btn5">줄이기</button>
    <hr />
    <div class="box">
      <div class="orange">보이기/숨기기</div>
      <div class="lightblue">토글</div>
      <div class="lighepurple">가로/세로크기</div>
    </div>
    <script>
      let btn1 = document.getElementById("btn1");
      let btn2 = document.getElementById("btn2");
      let box1 = document.querySelector(".box .orange");
      console.log(btn1);
      btn1.addEventListener("click", function () {
        box1.style.display = "none";
      });
      btn2.addEventListener("click", function () {
        box1.style.display = "flex";
      });

      let btn3 = document.getElementById("btn3");
      let box2 = document.querySelector(".box .lightblue");
      btn3.addEventListener("click", function () {
        if (box2.style.display == "none") {
          box2.style.display = "block";
        } else {
          box2.style.display = "none";
        }
      });

      let btn4 = document.getElementById("btn4");
      let btn5 = document.getElementById("btn5");
      let box3 = document.querySelector(".box .lighepurple");
      btn4.addEventListener("click", function () {
        box3.style.width = "600px";
        box3.style.height = "600px";
      });
      btn5.addEventListener("click", function () {
        box3.style.width = "200px";
        box3.style.height = "200px";
      });
    </script>
  </body>
</html>
