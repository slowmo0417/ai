<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>제이쿼리</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <h1>제이쿼리 함수</h1>
    <button id="btn1">숨김</button>
    <button id="btn2">보이기</button>
    <button id="btn3">토글</button>
    <button id="btn4">늘리기</button>
    <button id="btn5">줄이기</button>
    <hr />
    <div class="box">
      <div class="orange">보이기/숨기기</div>
      <div class="lightblue">토글</div>
      <div class="lighepurple">가로/세로크기</div>
    </div>
    <script src="./script/jquery-4.0.0.js"></script>
    <script>
      $(function () {
        $("button").css({ width: "100px", height: "100px" });
        $("#btn1").click(function () {
          $(".orange").hide();
        });
      });
      $("#btn2").click(function () {
        $(".orange").show();
      });
      $("#btn3").click(function () {
        $(".lightblue").toggle();
      });
      $("#btn4").click(function () {
        $(".lighepurple").width("600");
        $(".lighepurple").height("600");
      });
      $("#btn5").click(function () {
        $(".lighepurple").width("200");
        $(".lighepurple").height("200");
      });
    </script>
  </body>
</html>
