<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>click</title>
  </head>
  <body>
    <h1>큰제목태그</h1>
    <h2>중간제목태그</h2>
    <p>첫번째문단</p>

    <script>
      let tit = document.querySelector("h1");
      console.log(tit);
      tit.onclick = function () {
        this.style.color = "red";
      };
    </script>
  </body>
</html>
